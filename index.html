<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>AFMC VII Term Schedule</title>
    <meta name="theme-color" content="#0f172a">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-180.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="icon" href="./icon-192.png">

    <script>
        // Synchronous OS detection to avoid CSS FOUC (Flash of Unstyled Content)
        window.isIOSApp = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
        if (window.isIOSApp) {
            document.documentElement.classList.add('is-ios');
        }
    </script>

    <style>
        /* ── Common Base Layout ──────────────────────────────────────────── */
        * {
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        html {
            background-color: #0f172a;
        }
        
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            -webkit-text-size-adjust: 100%;
            background-color: #0f172a;
            color: #f8fafc;
        }

        /* ── Android Specific Layouts ────────────────────────────────────── */
        html:not(.is-ios) {
            height: 100dvh;
            overflow: hidden;
        }
        html:not(.is-ios) body {
            height: 100dvh;
            overflow: hidden;
            overscroll-behavior: none;
            width: 100%;
        }
        html:not(.is-ios) #app-container {
            height: 100dvh;
            height: -webkit-fill-available;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── iOS Specific Layouts ────────────────────────────────────────── */
        html.is-ios {
            height: 100%;
            height: -webkit-fill-available;
        }
        html.is-ios body {
            height: 100%;
            height: -webkit-fill-available;
            position: fixed;
            width: 100%;
            overflow: hidden;
            -webkit-touch-callout: none;
        }
        html.is-ios #app-container {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            padding-left: env(safe-area-inset-left);
            padding-right: env(safe-area-inset-right);
        }
        html.is-ios #calendar-header {
            padding-top: max(10px, env(safe-area-inset-top));
        }

        /* ── App Shell Common ────────────────────────────────────────────── */
        header {
            background-color: #0f172a;
            flex-shrink: 0;
            position: relative;
            z-index: 50;
        }
        html:not(.is-ios) header {
            padding-top: calc(1rem + env(safe-area-inset-top)) !important;
        }

        /* ── Day Slide Carousel ──────────────────────────────────────────── */
        .day-view {
            flex: 1;
            min-height: 0;
        }

        /* Android Carousel */
        html:not(.is-ios) #day-view-container {
            scroll-snap-type: x mandatory;
            overflow-x: scroll;
            overflow-y: hidden;
            display: flex;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
            touch-action: pan-x, pan-y;
        }
        html:not(.is-ios) #day-view-container::-webkit-scrollbar { display: none; }
        
        html:not(.is-ios) .day-slide {
            scroll-snap-align: start;
            flex: 0 0 100%;
            min-width: 0;
            width: 100%;
            height: 100%;
            overflow-y: scroll;
            overflow-x: hidden;
            overscroll-behavior-y: contain;
            -webkit-overflow-scrolling: touch;
            touch-action: pan-x, pan-y;
            padding: 1.25rem; /* p-5 */
            padding-bottom: 6rem; /* pb-24 */
        }

        /* iOS Carousel */
        html.is-ios #day-view-wrapper {
            position: relative;
            overflow: hidden;
            display: flex;
        }
        html.is-ios #day-track {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            display: flex;
            flex-direction: row;
            will-change: transform;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
        }
        html.is-ios .day-slide {
            flex: 0 0 100vw;
            max-width: 100vw; 
            height: 100%;
            overflow-y: scroll;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior-y: contain;
            padding: 20px 20px 100px;
        }
        @supports (padding: max(0px)) {
            html.is-ios .day-slide {
                max-width: min(100vw, 512px);
                flex: 0 0 min(100vw, 512px);
            }
        }

        /* ── Scrollbars & Panels ─────────────────────────────────────────── */
        .day-slide::-webkit-scrollbar { display: none; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .ios-scroll { overflow-y: scroll; -webkit-overflow-scrolling: touch; }

        .card-shadow  { box-shadow: 0 10px 15px -3px rgba(0,0,0,0.4); }
        .modal-open   { overflow: hidden; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        
        nav { padding-bottom: max(8px, env(safe-area-inset-bottom)); }

        /* ── Animations ──────────────────────────────────────────────────── */
        .pulse-icon { animation: pulse-blue 2s infinite; }
        @keyframes pulse-blue { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.05); opacity: 1; } }
        .live-dot { animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(1.2); } }

        /* ── Topics Log ──────────────────────────────────────────────────── */
        details > summary { list-style: none; cursor: pointer; }
        details > summary::-webkit-details-marker { display: none; }
        details[open] > summary .arrow { transform: rotate(180deg); }

        /* ── Transitions & Modals ────────────────────────────────────────── */
        .tab-content { display: none; opacity: 0; transition: opacity 0.2s ease-in-out; }
        .tab-content.active { display: flex; opacity: 1; height: 100%; min-height: 0; }

        #detail-panel { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); will-change: transform; }
        .panel-hidden { transform: translateY(100%); }
        .panel-visible { transform: translateY(0); }

        #install-banner { transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); max-height: 0; opacity: 0; overflow: hidden; }
        #install-banner.visible { max-height: 150px; opacity: 1; padding: 1rem; }

        #calendar-overlay { transition: opacity 0.2s ease, transform 0.25s cubic-bezier(0.4, 0, 0.2, 1); }
        #calendar-overlay.cal-hidden { opacity: 0; pointer-events: none; transform: translateY(-8px); }
        #calendar-overlay.cal-visible { opacity: 1; pointer-events: auto; transform: translateY(0); }

        /* ── Calendar UI ─────────────────────────────────────────────────── */
        .cal-day-cell { min-height: 100px; cursor: pointer; transition: background 0.15s; -webkit-tap-highlight-color: rgba(255,255,255,0.06); }
        .cal-day-cell:active { background: rgba(255,255,255,0.06); }
        .cal-day-cell.today-cell .cal-day-num { background: #2563eb; color: #fff; border-radius: 50%; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; }
        .cal-day-cell.other-month { opacity: 0.25; }
        .cal-day-cell.is-sunday .cal-day-num { color: #fbbf24; }
        .cal-day-cell.is-holiday { background: rgba(251,191,36,0.07); }

        .event-chip {
            font-size: 7.5px; font-weight: 700; line-height: 1.25; padding: 1.5px 3px; border-radius: 3px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%;
            display: block; text-transform: uppercase; letter-spacing: 0.01em; cursor: margin-bottom: 1.5px;
        }
        .chip-medicine { background: #1d4ed8; color: #bfdbfe; } .chip-surgery { background: #065f46; color: #a7f3d0; }
        .chip-obg { background: #9f1239; color: #fecdd3; } .chip-paeds { background: #9d174d; color: #fbcfe8; }
        .chip-ent { background: #92400e; color: #fde68a; } .chip-ortho { background: #7c2d12; color: #fed7aa; }
        .chip-ophthal { background: #4c1d95; color: #ddd6fe; } .chip-derm { background: #713f12; color: #fef08a; }
        .chip-psych { background: #312e81; color: #c7d2fe; } .chip-anaes { background: #164e63; color: #a5f3fc; }
        .chip-em { background: #7f1d1d; color: #fca5a5; } .chip-elective { background: #4c1d95; color: #e9d5ff; }
        .chip-holiday { background: #14532d; color: #86efac; } .chip-radiology { background: #1f2937; color: #d1d5db; }
        .chip-default { background: #1e293b; color: #94a3b8; }

        .cal-month-slide { scrollbar-width: none; -webkit-overflow-scrolling: touch; }
        .cal-month-slide::-webkit-scrollbar { display: none; }
        #cal-swipe-wrapper { touch-action: pan-x pan-y; }
    </style>
</head>

<body class="transition-colors duration-200">

    <!-- ── Offline Banner ──────────────────────────────────────────────── -->
    <div id="offline-notice" class="hidden bg-amber-600 text-white text-[10px] font-black uppercase tracking-widest text-center py-1 sticky top-0 z-[110]">
        Viewing Offline Cache
    </div>

    <!-- ── PWA Install Banner ──────────────────────────────────────────── -->
    <div id="install-banner" class="bg-blue-900/40 border-b border-blue-500/30 backdrop-blur-md sticky top-0 z-[100] max-w-lg mx-auto">
        <div class="flex items-center justify-between gap-4">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shrink-0 shadow-lg shadow-blue-900/50">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
                    </svg>
                </div>
                <div class="pr-2">
                    <p class="text-[11px] font-black uppercase tracking-widest text-white">AFMC Schedule</p>
                    <p id="install-text" class="text-[9px] text-blue-300 font-bold uppercase tracking-tighter">Install for offline access</p>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <button id="install-btn" class="bg-blue-600 text-white text-[10px] font-black uppercase tracking-widest px-4 py-2 rounded-lg shadow-lg active:scale-95 transition-transform">Install</button>
                <button id="close-install-banner" class="p-2 text-slate-400 hover:text-white">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <!-- ── Onboarding Overlay ───────────────────────────────────────────── -->
    <div id="onboarding-overlay" class="fixed inset-0 bg-slate-950/80 backdrop-blur-md z-[120] flex items-center justify-center p-6 hidden">
        <div class="bg-slate-900 rounded-3xl p-10 max-w-sm w-full shadow-2xl text-center border border-slate-800">
            <div class="mb-6 flex justify-center">
                <div class="w-20 h-20 bg-blue-500/20 rounded-2xl flex items-center justify-center border border-blue-500/30 pulse-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-blue-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 2l3 3.5-3 3.5-3-3.5L12 2z M12 9l4 10-4 3-4-3 4-10"/>
                    </svg>
                </div>
            </div>
            <h2 class="text-3xl font-black text-white mb-2 tracking-tight uppercase">Welcome, Cadet</h2>
            <p class="text-slate-400 mb-2 font-medium leading-relaxed uppercase text-[10px] tracking-widest text-blue-400">VII Term Duration</p>
            <p class="text-white mb-8 font-black text-lg">12 JAN - 17 MAY 2026</p>
            <div class="relative mb-8">
                <input type="number" id="init-roll-input" placeholder="001" min="1" max="150"
                    class="w-full p-5 bg-slate-800 border-2 border-slate-700 rounded-2xl text-center text-4xl font-black focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 outline-none text-white transition-all placeholder-slate-600">
                <label class="absolute -top-3 left-1/2 -translate-x-1/2 bg-slate-900 px-3 text-[10px] font-black text-blue-500 uppercase tracking-widest border border-slate-800 rounded-full">AFMC Roll No</label>
            </div>
            <div id="onboarding-error" class="hidden mb-4 text-xs font-bold text-red-500 uppercase tracking-tighter">Please enter roll (1-150)</div>
            <button id="start-btn" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black text-xl hover:bg-blue-700 transition transform active:scale-95 shadow-xl shadow-blue-500/20 uppercase tracking-widest">View My Schedule</button>
        </div>
    </div>

    <!-- ── Event Detail Panel (bottom sheet) ────────────────────────────── -->
    <div id="detail-overlay" class="fixed inset-0 bg-slate-950/80 z-[130] hidden transition-opacity">
        <div id="detail-panel" class="fixed bottom-0 left-0 right-0 max-w-lg mx-auto bg-slate-900 rounded-t-[40px] border-t border-slate-700 p-8 panel-hidden shadow-[0_-20px_50px_-12px_rgba(0,0,0,0.5)] ios-scroll" style="max-height: 80vh;">
            <div id="detail-drag-zone" class="w-full flex justify-center py-6 -mt-8 mb-2 cursor-grab active:cursor-grabbing touch-none">
                <div class="w-12 h-1.5 bg-slate-700 rounded-full"></div>
            </div>
            <div id="detail-content"></div>
            <button id="close-detail" class="w-full mt-8 bg-slate-800 text-slate-300 py-4 rounded-2xl font-black uppercase tracking-widest text-xs border border-slate-700 active:scale-95 transition-transform">Close Details</button>
        </div>
    </div>

    <!-- ── Calendar Month View Overlay ──────────────────────────────────── -->
    <div id="calendar-overlay" class="cal-hidden fixed inset-0 bg-slate-950/98 z-[115] flex flex-col max-w-lg mx-auto">

        <!-- Header: close | ‹ MONTH YEAR › | Today -->
        <div id="calendar-header" class="bg-slate-950 border-b border-slate-800 px-3 py-2.5 flex items-center justify-between shrink-0">
            <button id="cal-close-btn" class="p-2 rounded-xl bg-slate-800 text-slate-300 active:scale-95 transition-transform shrink-0">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
            <div class="flex items-center gap-2 flex-1 justify-center">
                <button id="cal-prev-btn" class="p-1.5 rounded-lg text-slate-400 active:text-white active:scale-95 transition-all font-black text-xl leading-none select-none">‹</button>
                <h2 id="cal-month-label" class="text-sm font-black text-white uppercase tracking-widest text-center min-w-[130px]"></h2>
                <button id="cal-next-btn" class="p-1.5 rounded-lg text-slate-400 active:text-white active:scale-95 transition-all font-black text-xl leading-none select-none">›</button>
            </div>
            <button id="cal-today-btn" class="px-2.5 py-1.5 bg-blue-600 text-white text-[9px] font-black uppercase tracking-widest rounded-lg active:scale-95 transition-transform shrink-0">Today</button>
        </div>

        <!-- Day-of-week labels -->
        <div class="grid grid-cols-7 bg-slate-900 border-b border-slate-800 shrink-0">
            <div class="text-[9px] font-black text-slate-500 uppercase tracking-widest text-center py-2">M</div>
            <div class="text-[9px] font-black text-slate-500 uppercase tracking-widest text-center py-2">T</div>
            <div class="text-[9px] font-black text-slate-500 uppercase tracking-widest text-center py-2">W</div>
            <div class="text-[9px] font-black text-slate-500 uppercase tracking-widest text-center py-2">T</div>
            <div class="text-[9px] font-black text-slate-500 uppercase tracking-widest text-center py-2">F</div>
            <div class="text-[9px] font-black text-slate-500 uppercase tracking-widest text-center py-2">S</div>
            <div class="text-[9px] font-black text-red-400/80 uppercase tracking-widest text-center py-2">S</div>
        </div>

        <!-- Swipeable 3-slide month carousel -->
        <div id="cal-swipe-wrapper" class="flex-1 overflow-hidden relative" style="touch-action: pan-y;">
            <div id="cal-carousel" class="flex h-full" style="transition: transform 0.3s cubic-bezier(0.4,0,0.2,1); will-change: transform;">
                <div class="cal-month-slide flex-shrink-0 w-full h-full overflow-y-auto bg-slate-900" id="cal-slide-0">
                    <div class="cal-grid-inner grid grid-cols-7 gap-px bg-slate-800/60 p-px"></div>
                </div>
                <div class="cal-month-slide flex-shrink-0 w-full h-full overflow-y-auto bg-slate-900" id="cal-slide-1">
                    <div class="cal-grid-inner grid grid-cols-7 gap-px bg-slate-800/60 p-px"></div>
                </div>
                <div class="cal-month-slide flex-shrink-0 w-full h-full overflow-y-auto bg-slate-900" id="cal-slide-2">
                    <div class="cal-grid-inner grid grid-cols-7 gap-px bg-slate-800/60 p-px"></div>
                </div>
            </div>
        </div>

        <!-- Day detail panel backdrop -->
        <div id="cal-day-backdrop" class="absolute inset-0 bg-slate-950/60 z-[9] opacity-0 pointer-events-none transition-opacity duration-300"></div>

        <!-- Day detail panel -->
        <div id="cal-day-panel" class="absolute inset-x-0 bottom-0 bg-slate-900 rounded-t-[40px] border-t border-slate-700 shadow-[0_-20px_50px_-12px_rgba(0,0,0,0.5)] panel-hidden z-10" style="max-height: 62%;">
            <div id="cal-day-panel-handle" class="flex justify-center pt-3 pb-1 cursor-grab active:cursor-grabbing touch-none shrink-0">
                <div class="w-10 h-1 bg-slate-700 rounded-full"></div>
            </div>
            <div class="flex items-center justify-between px-5 py-2 border-b border-slate-800 shrink-0">
                <div>
                    <p id="cal-day-panel-date"  class="text-xs font-black text-blue-400 uppercase tracking-widest"></p>
                    <p id="cal-day-panel-count" class="text-[9px] text-slate-500 font-bold uppercase tracking-widest mt-0.5"></p>
                </div>
                <button id="cal-day-panel-goto" class="px-3 py-1.5 bg-slate-800 text-slate-300 text-[9px] font-black uppercase tracking-widest rounded-lg border border-slate-700 active:scale-95 transition-transform">
                    Go to Day →
                </button>
            </div>
            <div id="cal-day-panel-events" class="overflow-y-auto px-4 py-3 space-y-2 ios-scroll" style="max-height: calc(62vh - 90px);"></div>
        </div>

        <!-- Legend -->
        <div id="cal-legend" class="bg-slate-950 border-t border-slate-800 px-4 py-2 flex flex-wrap gap-2 shrink-0"></div>
    </div>

    <!-- ── Main App Container ────────────────────────────────────────────── -->
    <div id="app-container" class="max-w-lg mx-auto bg-slate-900 shadow-2xl flex flex-col border-x border-slate-800 overflow-hidden relative">

        <!-- App Header -->
        <header class="bg-slate-950 text-white px-4 pb-4 pt-4 border-b border-slate-800 shadow-lg shrink-0 sticky top-0">
            <div class="flex justify-between items-center">
                <div>
                    <h1 class="text-xl font-black tracking-tight flex items-center gap-2">
                        <span class="text-blue-400">AFMC</span> Schedule
                    </h1>
                    <p id="user-info-display" class="text-[9px] text-blue-400/70 uppercase font-black tracking-[0.2em] mt-0.5"></p>
                </div>
                <button id="change-roll-btn" class="px-3 py-1.5 bg-slate-800 rounded-lg hover:bg-slate-700 flex items-center gap-2 transition-all border border-slate-700 active:scale-95 group">
                    <span class="text-[10px] font-black uppercase tracking-wider text-blue-100">Roll No.</span>
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5 text-blue-400 group-hover:scale-110 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                    </svg>
                </button>
            </div>
        </header>

        <!-- ── View 1: Schedule ─────────────────────────────────────────── -->
        <div id="schedule-tab-content" class="tab-content active flex-col flex-1 h-full overflow-hidden relative" style="min-height: 0;">
            
            <div id="ptr-indicator" class="absolute left-0 right-0 flex justify-center z-[5] pointer-events-none" style="transform: translateY(-50px); opacity: 0;">
                <div class="bg-slate-800 text-blue-400 rounded-full px-4 py-2 shadow-lg border border-slate-700 flex items-center gap-2 text-[10px] font-black uppercase tracking-widest">
                    <svg id="ptr-icon" xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 transition-transform duration-200" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 14l-7 7m0 0l-7-7m7 7V3"/>
                    </svg>
                    <span id="ptr-text">Pull to refresh</span>
                </div>
            </div>

            <!-- Controls bar -->
            <div class="p-3 bg-slate-950 border-b border-slate-800 space-y-2 z-10 shadow-lg shrink-0">
                <div class="flex space-x-2">
                    <button id="today-btn" class="flex-1 bg-blue-600 text-white font-black py-2.5 rounded-xl shadow-lg flex items-center justify-center hover:bg-blue-700 active:scale-95 transition-all uppercase tracking-widest text-[10px]">
                        Today
                    </button>
                    <div class="relative flex-1 bg-slate-900 border border-slate-700 rounded-xl flex items-center justify-center px-3 hover:border-violet-500 hover:bg-violet-900/20 transition-all cursor-pointer overflow-hidden group">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-violet-400 mr-2 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                        </svg>

            if (e.touches.length !== 1) return;
            startX = e.touches[0].clientX; startY = e.touches[0].clientY;
            curX = startX; ptrStartY = startY; dragging = true; isHoriz = null;
            startSlide = slideIndex; ptrPulling = false;
            if (track) track.style.transition = 'none';
        }, { passive: true });

        wrapper.addEventListener('touchmove', (e) => {
            if (!dragging || e.touches.length !== 1) return;
            const dx = e.touches[0].clientX - startX; const dy = e.touches[0].clientY - startY;
            curX = e.touches[0].clientX;
            if (isHoriz === null && (Math.abs(dx) > 6 || Math.abs(dy) > 6)) isHoriz = Math.abs(dx) > Math.abs(dy);

            if (isHoriz) {
                e.preventDefault();
                const baseX = -startSlide * getSlideWidth();
                if (track) track.style.transform = `translateX(${baseX + dx}px)`;
            } else if (!isHoriz && dy > 0) {
                const slide = allSlides[slideIndex];
                if (slide && slide.scrollTop <= 0) {
                    ptrPulling = true;
                    const pull = Math.min(dy * 0.4, PTR_THRESHOLD + 20);
                    ptrEl.style.transition = 'none';
                    ptrEl.style.transform  = `translateY(${pull - 50}px)`;
                    ptrEl.style.opacity    = String(Math.min(pull / 40, 1));
                    ptrIcon.style.transform = pull >= PTR_THRESHOLD ? 'rotate(180deg)' : 'rotate(0deg)';
                    ptrText.textContent     = pull >= PTR_THRESHOLD ? 'Release to refresh' : 'Pull to refresh';
                }
            }
        }, { passive: false });

        wrapper.addEventListener('touchend', (e) => {
            if (!dragging) return;
            dragging = false;

            if (ptrPulling) {
                const dy = (e.changedTouches[0]?.clientY ?? ptrStartY) - ptrStartY;
                const pull = Math.min(dy * 0.4, PTR_THRESHOLD + 20);
                ptrEl.style.transition = 'all 0.3s cubic-bezier(0.4,0,0.2,1)';
                if (pull >= PTR_THRESHOLD) {
                    ptrText.textContent = 'Refreshing...'; ptrIcon.classList.add('animate-spin');
                    ptrEl.style.transform = 'translateY(10px)';
                    setTimeout(() => location.reload(), 400);
                } else {
                    ptrEl.style.transform = 'translateY(-50px)'; ptrEl.style.opacity = '0';
                }
                ptrPulling = false; return;
            }

            if (!isHoriz) return;
            const dx = curX - startX; const threshold = getSlideWidth() * 0.25;

            if (dx < -threshold && slideIndex < allSlides.length - 1) goToSlide(slideIndex + 1);
            else if (dx > threshold && slideIndex > 0) goToSlide(slideIndex - 1);
            else setTrackPosition(startSlide, true);
        }, { passive: true });

        window.addEventListener('resize', () => {
            setTrackPosition(slideIndex, false);
            if (track) {
                const sw = getSlideWidth(); track.style.width = `${allSlides.length * sw}px`;
                allSlides.forEach(s => { s.style.width = `${sw}px`; s.style.flexBasis = `${sw}px`; });
            }
        });
    }

    // ═══════════════════════════════════════════════════════════════════════
    // ANDROID SCROLL & PTR (Exclusive for Android branch)
    // ═══════════════════════════════════════════════════════════════════════
    function scrollToSlideAndroid(slideElement, smooth = true) {
        if (!slideElement) return;
        const container = document.getElementById('day-view-container');
        const targetLeft = slideElement.offsetLeft;
        if (!smooth) { container.scrollLeft = targetLeft; return; }
        const startLeft = container.scrollLeft; const delta = targetLeft - startLeft;
        if (Math.abs(delta) < 2) return;
        const duration = 320; const startTime = performance.now();
        (function step(now) {
            const progress = Math.min((now - startTime) / duration, 1);
            container.scrollLeft = startLeft + delta * (1 - Math.pow(1 - progress, 3));
            if (progress < 1) requestAnimationFrame(step);
        })(startTime);
    }

    function setupPullToRefreshAndroid() {
        const container = document.getElementById('day-view-container');
        const ptrEl = document.getElementById('ptr-indicator');
        const ptrIcon = document.getElementById('ptr-icon');
        const ptrText = document.getElementById('ptr-text');
        
        let startX = 0, startY = 0, currentY = 0;
        let isPulling = false, isHorizontal = false;
        const THRESHOLD = 70;
    
        container.addEventListener('touchstart', (e) => {
            const activeSlide = e.target.closest('.day-slide');
            if (!activeSlide || activeSlide.scrollTop > 0) return;
            startX = e.touches[0].clientX; startY = e.touches[0].clientY;
            isPulling = true; isHorizontal = false; ptrEl.style.transition = 'none';
        }, { passive: true });
    
        container.addEventListener('touchmove', (e) => {
            if (!isPulling) return;
            const dx = Math.abs(e.touches[0].clientX - startX);
            currentY = e.touches[0].clientY; const dy = currentY - startY;
            if (dx > 10 && dx > dy) isHorizontal = true;
            if (isHorizontal || dy < 0) return;
    
            const pull = Math.min(dy * 0.4, THRESHOLD + 20);
            ptrEl.style.transform = `translateY(${pull - 50}px)`;
            ptrEl.style.opacity = Math.min(pull / 40, 1);
            
            ptrText.textContent = pull >= THRESHOLD ? 'Release to refresh' : 'Pull to refresh';
            ptrIcon.style.transform = pull >= THRESHOLD ? 'rotate(180deg)' : 'rotate(0deg)';
        }, { passive: true });
    
        container.addEventListener('touchend', () => {
            if (!isPulling) return;
            isPulling = false; const dy = currentY - startY;
            
            if (isHorizontal || dy < 0) {
                ptrEl.style.transition = 'all 0.3s cubic-bezier(0.4,0,0.2,1)';
                ptrEl.style.transform = 'translateY(-50px)'; ptrEl.style.opacity = '0'; return;
            }
    
            const pull = Math.min(dy * 0.4, THRESHOLD + 20);
            ptrEl.style.transition = 'all 0.3s cubic-bezier(0.4,0,0.2,1)';
            
            if (pull >= THRESHOLD) {
                ptrText.textContent = 'Refreshing...'; ptrIcon.style.transform = 'rotate(0deg)';
                ptrIcon.classList.add('animate-spin'); ptrEl.style.transform = `translateY(10px)`;
                setTimeout(() => location.reload(), 400);
            } else {
                ptrEl.style.transform = 'translateY(-50px)'; ptrEl.style.opacity = '0';
            }
        });
    }

    // ═══════════════════════════════════════════════════════════════════════

    function updateOfflineNotice(msg) {
        const el = document.getElementById('offline-notice');
        if (el) { el.textContent = msg; el.classList.remove('hidden'); }

    async function initialize() {
        // UI Container visibility logic
        if (isIOS) {
            document.getElementById('day-view-container').classList.add('hidden');
            document.getElementById('day-view-wrapper').classList.remove('hidden');
            document.getElementById('ptr-indicator').style.top = '0px'; // absolute from parent
        } else {
            document.getElementById('day-view-wrapper').classList.add('hidden');
            document.getElementById('day-view-container').classList.remove('hidden');
            const ptr = document.getElementById('ptr-indicator');
            ptr.style.top = '85px';
            ptr.classList.add('transition-all', 'duration-300');
        }

        setupOnboardingListeners();
        setupPWAInstallLogic();
        window.addEventListener('offline', () => updateOfflineNotice('Viewing Offline Cache'));
        if (!navigator.onLine) updateOfflineNotice('Viewing Offline Cache');

        if (!rollNo) { document.getElementById('onboarding-overlay').classList.remove('hidden'); return; }
        if (!location.hash.includes('roll=')) location.hash = `roll=${rollNo}`;

        document.getElementById('loading-indicator').classList.remove('hidden');

        const r      = parseInt(rollNo);
        const gBatch = getGeneralBatch(r);
        const cBatch = getClinicBatch(r);
        const sBatch = getSubBatch(r);
        document.getElementById('user-info-display').textContent = `Roll: ${rollNo} | Batch: ${sBatch} | Clinic: ${cBatch}`;

        let dynamicEvents = [];
        try {
            const snap = await getDocs(collection(db, `artifacts/${appId}/public/data/schedule`));
            snap.forEach(d => { const ev = d.data(); ev.id = d.id; ev.isDynamic = true; dynamicEvents.push(ev); });
            if (dynamicEvents.length > 0) localStorage.setItem('afmc_schedule_cache', JSON.stringify(dynamicEvents));
        } catch (e) {
            console.warn('Firebase fetch failed:', e);
            const cache = localStorage.getItem('afmc_schedule_cache');
            if (cache) {
                try { dynamicEvents = JSON.parse(cache); updateOfflineNotice("Viewing Offline Cache"); }
                catch { updateOfflineNotice("Offline: Generic Schedule"); }
            } else updateOfflineNotice("Offline: Generic Schedule");
        } finally {
            generateSchedule(gBatch, cBatch, sBatch, dynamicEvents);
            render();
            generateTopicsLog();
            
            if (isIOS) setupSwipeCarousel();
            else setupPullToRefreshAndroid();
            
            setupAppListeners();
            updateDatePickerLabel(getTodayStr());
            document.getElementById('loading-indicator').classList.add('hidden');
            calCurrentMonth = new Date().getMonth();
            calCurrentYear  = new Date().getFullYear();
            checkUrlDeepLink();
            setTimeout(() => setupPushSubscription(), 4000);
        }
    }

    // ═══════════════════════════════════════════════════════════════════════
    // SCHEDULE GENERATION
    // ═══════════════════════════════════════════════════════════════════════
    function addEntry(data, date, timeRange, topic, dept, loc) {
        const [start, end] = timeRange.split('-');
        data.push({ date, startTime: start, endTime: end, topic, department: normalizeDept(dept), location: loc, isDynamic: false });
    }

    function generateSchedule(gBatch, cBatch, sBatch, dynamicEvents = []) {
        const data   = [];
        let current  = new Date(termStartDate);
        const eStart = new Date(electivePeriod.start + 'T00:00:00Z');
        const eEnd   = new Date(electivePeriod.end   + 'T00:00:00Z');

        while (current <= termEndDate) {
            const dayName    = current.toLocaleDateString('en-US', { weekday: 'long', timeZone: 'UTC' });
            const ds         = current.toISOString().split('T')[0];
            const isElective = current >= eStart && current <= eEnd;
            const week       = getNthWeekdayOfMonth(current);
            const rules      = scheduleRules[dayName];

            const myDynamic = dynamicEvents.filter(e => {
                if (e.date !== ds) return false;
                const batches = Array.isArray(e.batch) ? e.batch : [e.batch];
                if (batches.includes("ALL")) return true;
                if (e.isClinics || e.isClinic) return batches.includes(cBatch);
                return batches.includes(gBatch) || batches.includes(sBatch);
            });
            myDynamic.forEach(e => {
                const entry = { ...e, department: normalizeDept(e.department) };
                if (!entry.topic || entry.topic.trim().toUpperCase() !== "NULL") data.push(entry);
            });

            const dynamicTimes    = new Set(myDynamic.map(e => e.startTime));
            const isFixedHoliday  = !!FIXED_HOLIDAYS[ds];
            const isGlobalHoliday = isFixedHoliday || dynamicEvents.some(e => e.date === ds && e.isHoliday && (Array.isArray(e.batch) ? e.batch.includes("ALL") : e.batch == "ALL"));

            if (isFixedHoliday) {
                const h = FIXED_HOLIDAYS[ds];
                data.push({ date: ds, isHoliday: true, isFixed: true, topic: h.name, holidayMsg: h.msg, holidaySub: h.sub, batch: ['ALL'], isDynamic: false });
            }

            const isOverridden = (range) => dynamicTimes.has(range.split('-')[0]);

            if (dayName !== "Sunday" && rules && !isGlobalHoliday) {
                if (!isElective) {
                    for (const [time, cfg] of Object.entries(rules.theory || {})) {
                        const topic = typeof cfg === 'string' ? cfg : cfg[week];
                        if (topic && !isOverridden(time)) addEntry(data, ds, time, topic, topic, "NLH Sushruta");
                    }
                    if (rules.pandemic && !isOverridden("09:00")) {
                        for (const [time, topic] of Object.entries(rules.pandemic)) addEntry(data, ds, time, topic, "Internal Medicine", "NLH Sushruta");
                    }
                    clinicalRotationRules.forEach(rot => {
                        const s = new Date(rot.startDate + 'T00:00:00Z'); const e = new Date(rot.endDate   + 'T00:00:00Z');
                        if (current >= s && current <= e && rot.batch === cBatch && !isOverridden("11:00")) addEntry(data, ds, "11:00-13:00", `${rot.department} Clinics`, rot.department, "OPD/Ward");
                    });
                    for (const [time, cfg] of Object.entries(rules.tutorials || {})) {
                        if (typeof cfg === 'string') {
                            if (!isOverridden(time)) addEntry(data, ds, time, `${cfg} Tutorial`, cfg, "NLH Sushruta");
                        } else if (cfg[week] && !Object.values(cfg).some(v => v === 'A' || v === 'B' || v === 'C')) {
                            if (!isOverridden(time)) addEntry(data, ds, time, `${cfg[week]} Tutorial`, cfg[week], "NLH Sushruta");
                        } else {
                            for (const [topic, target] of Object.entries(cfg)) {
                                if ((target === gBatch || (typeof target === 'number' && target === week)) && !isOverridden(time)) addEntry(data, ds, time, `${topic} Tutorial`, topic, "Tutorial Room");
                            }
                        }
                    }
                    for (const [time, cfg] of Object.entries(rules.sdl || {})) {
                        const topic = cfg[week];
                        if (topic && !isOverridden(time)) (Array.isArray(topic) ? topic : [topic]).forEach(t => addEntry(data, ds, time, `SDL ${t}`, t, "Library/Dept"));
                    }
                } else {
                    if (!isOverridden("11:00")) addEntry(data, ds, "11:00-13:00", "Elective Rotation", "Electives", "Clinical Dept");
                }
            }
            current.setUTCDate(current.getUTCDate() + 1);
        }

        personalizedSchedule = data;

        const select = document.getElementById('dept-filter');
        const depts  = [...new Set(data.map(e => e.department).filter(Boolean))].sort();
        select.innerHTML = '<option value="all">ALL DEPTS</option>';
        depts.forEach(d => {
            const opt = document.createElement('option');
            opt.value = d; opt.textContent = d.toUpperCase();
            select.appendChild(opt);
        });
    }

    // ═══════════════════════════════════════════════════════════════════════
    // UNIFIED RENDER LOGIC
    // ═══════════════════════════════════════════════════════════════════════
    function render() {
        if (isIOS) renderIOS(); else renderAndroid();
    }

    function buildSlideContent(ds, isToday, curDate) {
        let content = `<h2 class="text-4xl font-black mb-8 flex items-center ${isToday ? 'text-blue-400 border-l-8 border-blue-600 pl-5' : 'text-slate-100'} tracking-tighter">
            ${isToday ? '<span class="w-3 h-3 bg-blue-500 rounded-full mr-4 live-dot"></span>' : ''}
            ${curDate.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric', timeZone: 'UTC' }).toUpperCase()}
        </h2>`;

        const dayEvents = personalizedSchedule.filter(e => e.date === ds);
        const filtered  = currentFilter === 'all' ? dayEvents : dayEvents.filter(e => e.department === currentFilter);
        const sorted    = filtered.sort((a,b) => (a.startTime||'00:00').localeCompare(b.startTime||'00:00'));

        if (sorted.length) {
            const holiday = sorted.find(e => e.isHoliday);
            if (holiday) {
                const msg = holiday.holidayMsg || `🎉 ${esc(holiday.topic) || 'HOLIDAY'}`;
                content += `<div class="bg-slate-800/50 p-16 rounded-[40px] text-center border-4 border-dotted border-amber-500/40 flex flex-col items-center gap-4">
                    <div class="text-4xl">${msg.match(/^\p{Emoji}/u)?.[0] || '🎉'}</div>
                    <div class="text-amber-300 font-black text-2xl tracking-tight">${esc(msg.replace(/^\p{Emoji}\s*/u,''))}</div>
                    <div class="text-slate-400 font-bold text-sm uppercase tracking-widest">${esc(holiday.holidaySub || '')}</div>
                </div>`;
            } else {
                content += sorted.map(e => {
                    const idx = personalizedSchedule.indexOf(e);
                    return `<div class="bg-slate-800 border-l-[10px] ${getDeptStyles(e.department)} p-6 mb-6 card-shadow rounded-r-3xl border border-slate-700 overflow-hidden ${e.isDynamic ? (isIOS ? 'active:scale-[0.98] transition-transform cursor-pointer' : 'clickable-card cursor-pointer hover:bg-slate-700 active:scale-95') : ''}"
                        ${e.isDynamic ? `onclick="window.showDetails('${ds}', ${idx})"` : ''}>
                        <div class="flex justify-between items-start gap-3 flex-nowrap">
                            <div class="flex-1 min-w-0">
                                <div class="flex items-center gap-2 mb-1.5 flex-wrap">
                                    <p class="font-black text-slate-50 leading-[1.1] text-2xl uppercase tracking-tighter line-clamp-2">${esc(e.topic)}</p>
                                    ${e.isDynamic ? '<span class="text-[8px] bg-blue-500/20 text-blue-400 px-1.5 py-0.5 rounded font-black tracking-widest uppercase shrink-0">Details</span>' : ''}
                                </div>
                                <p class="text-[10px] opacity-70 uppercase font-black tracking-widest truncate">${esc(e.department)}</p>
                            </div>
                            <div class="text-right flex flex-col items-end shrink-0 ml-1">
                                <div class="bg-blue-700 text-white px-4 py-2 rounded-2xl text-lg sm:text-xl font-black shadow-xl shadow-slate-900/40 mb-1.5 leading-none whitespace-nowrap">${e.startTime}</div>
                                <p class="text-[10px] text-slate-400 uppercase font-black tracking-tighter">TO ${e.endTime}</p>
                            </div>
                        </div>
                        ${e.location ? `<div class="mt-6 flex items-center text-[12px] font-black text-slate-400 border-t border-slate-700 pt-4 uppercase tracking-widest"><span>📍 ${esc(e.location)}</span></div>` : ''}
                    </div>`;
                }).join('');
            }
        } else {
            const msg = curDate.getUTCDay() === 0 ? '🌞 SUNDAY' : 'REST DAY';
            content += `<div class="bg-slate-800/50 p-16 rounded-[40px] text-center text-slate-600 font-black text-sm border-4 border-dotted border-slate-700 uppercase tracking-[0.2em]">${msg}</div>`;
        }
        return { content, hasItems: currentFilter === 'all' || sorted.length > 0 };
    }

    function renderAndroid() {
        const container = document.getElementById('day-view-container');
        container.innerHTML = '';
        const todayStr = getTodayStr();
        let cur = new Date(termStartDate);

        while (cur <= termEndDate) {
            const ds = cur.toISOString().split('T')[0];
            const { content, hasItems } = buildSlideContent(ds, ds === todayStr, cur);
            
            if (hasItems) {
                const slide = document.createElement('div');
                slide.className = 'day-slide p-5 pb-24 overflow-y-auto';
                slide.dataset.date = ds;
                slide.innerHTML = content;
                container.appendChild(slide);
            }
            cur.setUTCDate(cur.getUTCDate() + 1);
        }

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (!entry.isIntersecting) return;
                const ds = entry.target.dataset.date;
                currentlyVisibleDate = ds;
                updateWeekDisplay(ds);
            });
        }, { threshold: 0.5, root: container });

        document.querySelectorAll('#day-view-container .day-slide').forEach(s => observer.observe(s));
        const slides = Array.from(document.querySelectorAll('#day-view-container .day-slide'));
        scrollToSlideAndroid(slides.find(s => s.dataset.date >= todayStr) || slides[slides.length - 1], false);
    }

    function renderIOS() {
        const track = document.getElementById('day-track');
        const todayStr = getTodayStr();
        track.innerHTML = '';
        allSlides = [];
        const slideWidth = getSlideWidth();
        let cur = new Date(termStartDate);

        while (cur <= termEndDate) {
            const ds = cur.toISOString().split('T')[0];
            const { content, hasItems } = buildSlideContent(ds, ds === todayStr, cur);

            if (hasItems) {
                const slide = document.createElement('div');
                slide.className = 'day-slide';
                slide.dataset.date = ds;
                slide.style.width = `${slideWidth}px`;
                slide.style.flexBasis = `${slideWidth}px`;
                slide.style.flexShrink = '0';
                slide.innerHTML = content;
                track.appendChild(slide);
                allSlides.push(slide);
            }
            cur.setUTCDate(cur.getUTCDate() + 1);
        }

        track.style.width = `${allSlides.length * slideWidth}px`;
        const todayIdx = allSlides.findIndex(s => s.dataset.date === todayStr) ?? allSlides.findIndex(s => s.dataset.date >= todayStr);
        const targetIdx = todayIdx >= 0 ? todayIdx : allSlides.length - 1;
        slideIndex = targetIdx;
        setTrackPosition(targetIdx, false);
        updateWeekDisplay(allSlides[targetIdx]?.dataset?.date || todayStr);
    }

    function updateWeekDisplay(dateStr) {
        const date  = new Date(dateStr + 'T00:00:00Z');
        const start = getStartOfWeek(date);
        const end   = new Date(start); end.setUTCDate(start.getUTCDate() + 6);
        document.getElementById('current-week-display').textContent = `${start.toLocaleDateString('en-US',{month:'short',day:'numeric',timeZone:'UTC'})} - ${end.toLocaleDateString('en-US',{month:'short',day:'numeric',timeZone:'UTC'})}, 2026`.toUpperCase();
    }

    // ═══════════════════════════════════════════════════════════════════════
    // TOPICS LOG
    // ═══════════════════════════════════════════════════════════════════════
    function generateTopicsLog() {
        const todayStr    = getTodayStr();
        const container   = document.getElementById('log-container');
        container.innerHTML = '';

        const pastEvents = personalizedSchedule.filter(e => {
            if (e.date > todayStr) return false;
            if (!e.topic || e.topic.toUpperCase() === 'NULL' || e.topic.toUpperCase().includes('CANCEL')) return false;
            if (e.isHoliday) return false;
            if (e.startTime && parseInt(e.startTime) >= 10 && parseInt(e.startTime) < 13) return false;
            return true;
        });

        if (window.Fuse) logFuse = new Fuse(pastEvents, { keys: ['topic','department'], threshold: 0.3 });

        const grouped = pastEvents.reduce((acc, e) => {
            const dept = e.department || 'Other';
            (acc[dept] = acc[dept] || []).push(e);
            return acc;
        }, {});

        const deptStats = Object.keys(grouped).map(dept => {
            const uniqueMap = new Map();
            grouped[dept].forEach(e => {
                const t = e.topic.trim();
                if (!uniqueMap.has(t)) uniqueMap.set(t, { topic: t, dates: [] });
                uniqueMap.get(t).dates.push(e.date);
            });
            const uniqueList = Array.from(uniqueMap.values()).sort((a, b) => {
                const maxA = a.dates.reduce((m,d) => d>m?d:m, '');
                const maxB = b.dates.reduce((m,d) => d>m?d:m, '');
                return maxB.localeCompare(maxA);
            });
            return { dept, uniqueTopics: uniqueList, count: uniqueList.length };
        }).sort((a, b) => b.count - a.count);

        if (deptStats.length === 0) {
            container.innerHTML = `<div class="text-center text-slate-500 font-bold mt-10 uppercase tracking-widest text-xs">No completed classes yet.</div>`;
            return;
        }

        deptStats.forEach(({ dept, uniqueTopics, count }) => {
            container.innerHTML += `
                <details class="group bg-slate-800 rounded-xl border border-slate-700 overflow-hidden mb-3 open:border-blue-500/50 transition-colors">
                    <summary class="flex justify-between items-center p-4 bg-slate-800 hover:bg-slate-750 select-none">
                        <div class="flex items-center gap-3">
                            <div class="w-2 h-8 rounded-full ${getDeptColorClass(dept)}"></div>
                            <div>
                                <h3 class="font-black text-white text-sm uppercase tracking-wide leading-none">${esc(dept)}</h3>
                                <p class="text-[9px] text-slate-400 font-bold uppercase tracking-widest mt-1">${count} Topics Completed</p>
                            </div>
                        </div>
                        <svg xmlns="http://www.w3.org/2000/svg" class="arrow h-5 w-5 text-slate-500 transition-transform duration-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                        </svg>
                    </summary>
                    <div class="p-2 space-y-2 bg-slate-900/50 border-t border-slate-700/50">
                        ${uniqueTopics.map(e => `
                            <div class="p-3 bg-slate-800 rounded-lg flex items-center gap-3 border border-slate-700/50 ml-2">
                                <div class="flex-1">

    function offsetMonth(year, month, delta) {
        let m = month + delta, y = year;
        while (m > 11) { m -= 12; y++; } while (m < 0)  { m += 12; y--; }
        return { year: y, month: m };
    }

    function renderMonthIntoSlide(slideIndex, year, month) {
        const slide = document.getElementById(`cal-slide-${slideIndex}`);
        const grid  = slide.querySelector('.cal-grid-inner');
        grid.innerHTML = ''; slide.scrollTop = 0;

        const todayStr = getTodayStr(); const eventMap = {};
        personalizedSchedule.forEach(e => { (eventMap[e.date] = eventMap[e.date] || []).push(e); });

        const firstDay = new Date(Date.UTC(year, month, 1));
        const totalDays = new Date(Date.UTC(year, month + 1, 0)).getUTCDate();
        const startOffset = (firstDay.getUTCDay() + 6) % 7;
        const legendDepts = new Set();

        for (let i = 0; i < startOffset; i++) {
            const d  = new Date(Date.UTC(year, month, 1 - startOffset + i));
            grid.appendChild(buildDayCell(d.toISOString().split('T')[0], d.getUTCDate(), true, eventMap[d.toISOString().split('T')[0]]||[], todayStr, legendDepts));
        }
        for (let d = 1; d <= totalDays; d++) {
            const ds = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            grid.appendChild(buildDayCell(ds, d, false, eventMap[ds]||[], todayStr, legendDepts));
        }
        const remainder = (startOffset + totalDays) % 7;
        if (remainder !== 0) {
            for (let i = 1; i <= 7 - remainder; i++) {
                const d  = new Date(Date.UTC(year, month + 1, i));
                grid.appendChild(buildDayCell(d.toISOString().split('T')[0], d.getUTCDate(), true, eventMap[d.toISOString().split('T')[0]]||[], todayStr, legendDepts));
            }
        }
        return legendDepts;
    }

    function renderAllCalSlides() {
        const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
        document.getElementById('cal-month-label').textContent = `${MONTHS[calCurrentMonth]} ${calCurrentYear}`;
        const prev = offsetMonth(calCurrentYear, calCurrentMonth, -1);
        const next = offsetMonth(calCurrentYear, calCurrentMonth, +1);
        renderMonthIntoSlide(0, prev.year, prev.month);
        const legendDepts = renderMonthIntoSlide(1, calCurrentYear, calCurrentMonth);
        renderMonthIntoSlide(2, next.year, next.month);
        const carousel = document.getElementById('cal-carousel');
        carousel.style.transition = 'none'; carousel.style.transform  = 'translateX(-100%)';
        renderCalLegend(legendDepts);
    }

    function commitMonthShift(direction) {
        if (calIsAnimating) return;
        calIsAnimating = true; closeCalDayPanel();
        const carousel = document.getElementById('cal-carousel');
        carousel.style.transition = 'transform 0.3s cubic-bezier(0.4,0,0.2,1)';
        carousel.style.transform  = direction === 1 ? 'translateX(-200%)' : 'translateX(0%)';
        carousel.addEventListener('transitionend', function handler() {
            carousel.removeEventListener('transitionend', handler);
            const shifted = offsetMonth(calCurrentYear, calCurrentMonth, direction);
            calCurrentYear = shifted.year; calCurrentMonth = shifted.month;
            renderAllCalSlides(); calIsAnimating = false;
        }, { once: true });
    }

    function buildDayCell(dateStr, dayNum, isOtherMonth, events, todayStr, legendDepts) {
        const cell = document.createElement('div');
        const isToday = dateStr === todayStr, isSunday = new Date(dateStr + 'T00:00:00Z').getUTCDay() === 0;
        const inTerm = dateStr >= '2026-01-12' && dateStr <= '2026-05-17', holiday = events.find(e => e.isHoliday);

        cell.className = `cal-day-cell bg-slate-900 p-1.5 flex flex-col ${isOtherMonth ? 'other-month' : ''} ${isToday ? 'today-cell' : ''} ${isSunday ? 'is-sunday' : ''} ${holiday ? 'is-holiday' : ''}`;
        cell.dataset.date = dateStr;

        const numEl = document.createElement('div');
        numEl.className = `cal-day-num text-[11px] font-black mb-1 ${isSunday ? 'text-amber-400' : 'text-slate-300'} ${isOtherMonth ? '!text-slate-600' : ''} ${isToday ? '!text-white' : ''}`;
        numEl.textContent = dayNum; cell.appendChild(numEl);

        if (holiday && !isOtherMonth) {
            legendDepts.add('__holiday__');
            const banner = document.createElement('div');
            banner.className = 'rounded bg-amber-400/20 border border-amber-400/40 px-1 py-1 text-center mb-1';
            banner.innerHTML = `<div class="text-base leading-none mb-0.5">🎉</div><span class="text-[8px] font-black text-amber-300 uppercase tracking-wide block leading-tight">${(holiday.topic||'Holiday').replace(/Holiday/i,'').trim()||'Holiday'}</span>`;
            cell.appendChild(banner);
        } else if (isSunday && !isOtherMonth) {
            const sun = document.createElement('div'); sun.className = 'text-center text-base leading-none mb-1'; sun.textContent = '☀️'; cell.appendChild(sun);
        } else if (inTerm && !isOtherMonth) {
            const sorted = [...events].sort((a,b) => (a.startTime||'').localeCompare(b.startTime||''));
            sorted.slice(0, 4).forEach(e => {
                const dept = e.department || 'Other'; legendDepts.add(dept);
                const chip = document.createElement('span'); chip.className = `event-chip ${getChipClass(dept)}`;
                chip.textContent = (e.topic || dept).replace(/Tutorial|SDL|Clinics/gi, '').trim() || dept;

    function setupCalSwipeCommon() {
        const wrapper = document.getElementById('cal-swipe-wrapper');
        const carousel = document.getElementById('cal-carousel');
        let touchStartX = 0, touchStartY = 0, touchDeltaX = 0;
        let isSwiping = false, isVertical = false;

        wrapper.addEventListener('touchstart', (e) => {
            if (calIsAnimating) return;
            touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY;
            touchDeltaX = 0; isSwiping = true; isVertical = false;
            carousel.style.transition = 'none';
        }, { passive: true });

        wrapper.addEventListener('touchmove', (e) => {
            if (!isSwiping || calIsAnimating) return;
            const dx = e.touches[0].clientX - touchStartX; const dy = e.touches[0].clientY - touchStartY;
            if (!isVertical && Math.abs(dy) > Math.abs(dx) && Math.abs(dy) > 8) isVertical = true;
            if (isVertical) return;
            if (Math.abs(dx) > 5) {
                if (!isIOS) e.preventDefault();
                touchDeltaX = dx; carousel.style.transform = `translateX(calc(-100% + ${dx}px))`;
            }
        }, { passive: false });

        wrapper.addEventListener('touchend', () => {
            if (!isSwiping || calIsAnimating || isVertical) { isSwiping = false; return; }
            isSwiping = false; const threshold = wrapper.offsetWidth * 0.25;
            if (touchDeltaX < -threshold) commitMonthShift(+1);
            else if (touchDeltaX > threshold) commitMonthShift(-1);
            else { carousel.style.transition = 'transform 0.25s cubic-bezier(0.4,0,0.2,1)'; carousel.style.transform = 'translateX(-100%)'; }
        }, { passive: true });

        if (!isIOS) {
            let wheelAccumX = 0, wheelAccumY = 0, wheelTimer = null;
            wrapper.addEventListener('wheel', (e) => {
                if (calIsAnimating) return;
                wheelAccumX += e.deltaX; wheelAccumY += e.deltaY;
                if (Math.abs(wheelAccumY) > Math.abs(wheelAccumX) * 1.5) { wheelAccumX = 0; wheelAccumY = 0; return; }
                if (Math.abs(wheelAccumX) > 8) e.preventDefault();
                carousel.style.transition = 'none'; carousel.style.transform = `translateX(calc(-100% + ${Math.max(-120, Math.min(120, -wheelAccumX))}px))`;
                clearTimeout(wheelTimer);
                wheelTimer = setTimeout(() => {
                    if (Math.abs(wheelAccumX) >= 60) commitMonthShift(wheelAccumX > 0 ? +1 : -1);
                    else { carousel.style.transition = 'transform 0.25s cubic-bezier(0.4,0,0.2,1)'; carousel.style.transform = 'translateX(-100%)'; }
                    wheelAccumX = 0; wheelAccumY = 0;
                }, 80);
            }, { passive: false });
        }
    }

        handle.addEventListener('touchmove',  (e) => { if (!isDragging) return; const d = e.touches[0].clientY - startY; if (d > 0) panel.style.transform = `translateY(${d}px)`; }, { passive: true });
        handle.addEventListener('touchend',   (e) => {

        // Export Calendar - Intelligent Week Detection
        document.getElementById('add-to-calendar-btn').onclick = () => {
            const toICS = (date, time) => `${date.replace(/-/g,'')}T${time.replace(/:/g,'')}00`;
            
            // 1. Get the date currently being viewed in the app
            const viewedDate = new Date(currentlyVisibleDate + 'T00:00:00Z');
            const dayOfWeek = viewedDate.getUTCDay(); // 0 = Sunday, 1 = Monday...
        
            // 2. Determine the start of the export range
            // If it's Sunday (0), we move to the next day (Monday) to get the upcoming week.
            // Otherwise, we find the Monday of the current week.
            let exportStartDate = new Date(viewedDate);
            if (dayOfWeek === 0) {
                exportStartDate.setUTCDate(viewedDate.getUTCDate() + 1);
            } else {
                const diff = viewedDate.getUTCDate() - dayOfWeek + 1;
                exportStartDate.setUTCDate(diff);
            }
        
            // 3. Define the end of the 7-day range (the following Sunday)
            const exportEndDate = new Date(exportStartDate);
            exportEndDate.setUTCDate(exportStartDate.getUTCDate() + 6);
        
            // 4. Filter the personalizedSchedule
            const weekEvs = personalizedSchedule.filter(e => {
                const eventDate = new Date(e.date + 'T00:00:00Z');
                
                // Check 1: Is the event within our calculated 7-day window?
                const isInRange = eventDate >= exportStartDate && eventDate <= exportEndDate;
                if (!isInRange) return false;
            
                // Check 2: Is this day marked as a holiday? 
                // We check both the global FIXED_HOLIDAYS and the specific event property
                const isHoliday = (typeof FIXED_HOLIDAYS !== 'undefined' && FIXED_HOLIDAYS[e.date]) || e.isHoliday;
                
                return !isHoliday; // Only keep the event if it's NOT a holiday
            });
        
            // 5. Build the ICS File
            const ics = [
                'BEGIN:VCALENDAR',
                'VERSION:2.0',
                'PRODID:-//AFMC//Schedule//EN',
                'CALSCALE:GREGORIAN',
                'METHOD:PUBLISH'
            ];
        
            weekEvs.forEach(e => {
                // Skip hidden/null topics
                if (!e.topic || e.topic.toUpperCase() === 'NULL') return;
            
                // 1. Identify the instructor/faculty name
                const faculty = e.instructor || e.faculty || 'Staff';
                
                // 2. Format the Summary to include "Lecture by"
                const summary = `${e.topic} (Lecture by ${faculty})`;
            
                const start = e.startTime ? e.startTime.replace(':', '') : "0800";
                const end = e.endTime ? e.endTime.replace(':', '') : "0900";
                
                ics.push('BEGIN:VEVENT');
                ics.push(`SUMMARY:${summary}`); // Updated to show faculty
                ics.push(`DTSTART;TZID=Asia/Kolkata:${e.date.replace(/-/g,'')}T${start}00`);
                ics.push(`DTEND;TZID=Asia/Kolkata:${e.date.replace(/-/g,'')}T${end}00`);
                ics.push(`LOCATION:${e.location || 'AFMC'}`);
                // Optional: Also put the faculty in the description for better visibility in mobile apps
                ics.push(`DESCRIPTION:Dept: ${e.department}\\nInstructor: ${faculty}${e.isDynamic ? ' (Updated)' : ''}`);
                ics.push('END:VEVENT');
            });
        
            ics.push('END:VCALENDAR');
        
            // 6. Trigger Download
            const blob = new Blob([ics.join('\r\n')], { type: 'text/calendar' });
            const a = document.createElement('a');
            const dateLabel = exportStartDate.toISOString().split('T')[0];
            a.href = URL.createObjectURL(blob);
            a.download = `AFMC_Week_Starting_${dateLabel}.ics`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        };

        // Detail panel drag
        document.getElementById('close-detail').onclick = closeDetail; document.getElementById('detail-overlay').onclick = (e) => { if (e.target.id === 'detail-overlay') closeDetail(); };
        const dragZone = document.getElementById('detail-drag-zone'), detailPanel = document.getElementById('detail-panel');
        let detStartY, detIsDragging = false;
        dragZone.addEventListener('touchstart', (e) => { detStartY = e.touches[0].clientY; detIsDragging = true; detailPanel.style.transition = 'none'; }, { passive: true });
        dragZone.addEventListener('touchmove',  (e) => { if (!detIsDragging) return; const d = e.touches[0].clientY - detStartY; if (d > 0) detailPanel.style.transform = `translateY(${d}px)`; }, { passive: true });
        dragZone.addEventListener('touchend',   (e) => {
            detIsDragging = false; detailPanel.style.transition = 'transform 0.3s cubic-bezier(0.4,0,0.2,1)';
            const d = e.changedTouches[0].clientY - detStartY;
            if (d > 100) closeDetail(); else { detailPanel.style.transform = ''; if (d < 10 && d > -10) closeDetail(); }
        }, { passive: true });
    }

    // ═══════════════════════════════════════════════════════════════════════
    // PUSH NOTIFICATIONS & DEEP LINKING
    // ═══════════════════════════════════════════════════════════════════════
    function isPushSupported() { return ('Notification' in window) && ('serviceWorker' in navigator) && ('PushManager' in window); }

    function showPushPermissionPrompt(onAllow, onDismiss) {
        if (document.getElementById('push-permission-prompt')) return;
        const isStandalone = window.navigator.standalone || window.matchMedia('(display-mode: standalone)').matches;
        const isDenied     = 'Notification' in window && Notification.permission === 'denied';
        const prompt = document.createElement('div'); prompt.id = 'push-permission-prompt';
        prompt.className = 'fixed bottom-20 left-1/2 z-[200] max-w-sm w-[92%] bg-slate-800 border border-blue-500/30 rounded-2xl shadow-2xl p-4';
        prompt.style.cssText = 'opacity:0; transform: translateX(-50%) translateY(16px); transition: all 0.3s cubic-bezier(0.4,0,0.2,1);';
        const settingsNote = isDenied ? `<p class="text-[10px] text-amber-400/80 mt-2 leading-snug">⚠️ Notifications blocked. Tap Enable to see how to allow them.</p>` : '';
        const pwaNote = isStandalone && isIOS ? `<p class="text-[10px] text-slate-500 mt-2 leading-snug">Enable in iOS Settings → Notifications → AFMC Schedule.</p>` : '';
        prompt.innerHTML = `
            <div class="flex items-start gap-3 mb-4">
                <div class="w-10 h-10 bg-blue-600/20 rounded-xl flex items-center justify-center shrink-0 border border-blue-500/30">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-blue-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
                </div>
                <div class="flex-1"><p class="text-white font-black text-sm uppercase tracking-wide">Schedule Notifications</p><p class="text-slate-400 text-[11px] mt-0.5 leading-snug">Get notified when the weekly schedule is uploaded or a class changes.</p>${settingsNote}${pwaNote}</div>
            </div>
            <div class="flex gap-2">
                <button id="push-allow-btn" class="flex-1 bg-blue-600 hover:bg-blue-500 text-white font-black text-xs uppercase tracking-widest py-2.5 rounded-xl active:scale-95 transition-all">Enable</button>
                <button id="push-dismiss-btn" class="flex-1 bg-slate-700 hover:bg-slate-600 text-slate-300 font-black text-xs uppercase tracking-widest py-2.5 rounded-xl active:scale-95 transition-all">Not Now</button>
            </div>`;
        document.body.appendChild(prompt);
        requestAnimationFrame(() => { prompt.style.opacity = '1'; prompt.style.transform = 'translateX(-50%) translateY(0)'; });
        const hidePrompt = () => { prompt.style.opacity = '0'; prompt.style.transform = 'translateX(-50%) translateY(16px)'; setTimeout(() => prompt.remove(), 300); };
        document.getElementById('push-allow-btn').onclick = () => { hidePrompt(); onAllow(); };
        document.getElementById('push-dismiss-btn').onclick = () => { hidePrompt(); onDismiss(); };
    }

    async function setupPushSubscription() {
        try {
            if (!isPushSupported()) return;
            const permission = Notification.permission;
            if (permission === 'granted') {
                if (window._fcm && VAPID_KEY !== 'BICHqHWClv7ixGsaf1Sq3xW3N0oDU6Pf_LG8ShqR-voDg7G5JZM56khvDLnUuv2M52Wvwa_YTkUas8qubselsLo') { const reg = window._swReg || await navigator.serviceWorker.ready; await doSubscribe(reg); }
            } else if (permission === 'default') {
                showPushPermissionPrompt(() => {
                    Notification.requestPermission().then(async result => {
                        if (result === 'granted') {
                            if (VAPID_KEY !== 'BICHqHWClv7ixGsaf1Sq3xW3N0oDU6Pf_LG8ShqR-voDg7G5JZM56khvDLnUuv2M52Wvwa_YTkUas8qubselsLo') { if (!window._fcm) await new Promise(r => setTimeout(r, 3000)); if (window._fcm) { const reg = window._swReg || await navigator.serviceWorker.ready; await doSubscribe(reg); } }
                        } else localStorage.setItem('push_denied_at', Date.now().toString());
                    });
                }, () => {});
            } else if (permission === 'denied') {
                if (Date.now() - parseInt(localStorage.getItem('push_denied_at') || '0') < 2 * 24 * 60 * 60 * 1000) return;
                showPushPermissionPrompt(
                    () => { showInAppToast('Enable in Settings', isIOS ? 'Go to iOS Settings → Notifications → AFMC Schedule → Allow' : 'Tap 🔒 in address bar → Notifications → Allow'); localStorage.setItem('push_denied_at', Date.now().toString()); },
                    () => { localStorage.setItem('push_denied_at', Date.now().toString()); }
                );
            }
        } catch (e) { console.warn('[Push] Setup failed:', e); }
    }

    async function doSubscribe(swReg) {
        try {
            const { getToken, onMessage, messaging } = window._fcm;
            const token = await getToken(messaging, { vapidKey: VAPID_KEY, serviceWorkerRegistration: await navigator.serviceWorker.ready });
            if (!token) return;
            await setDoc(doc(db, `artifacts/schedule-debeb/public/data/push_tokens/${token}`), { token, roll: parseInt(localStorage.getItem('afmc_roll_no') || '0') || null, updatedAt: new Date().toISOString(), userAgent: navigator.userAgent.substring(0, 100) });
            onMessage(messaging, (payload) => { showInAppToast(payload.notification?.title || 'Schedule Update', payload.notification?.body || ''); });
        } catch (e) { console.warn('[Push] doSubscribe failed:', e); }
    }

    function showInAppToast(title, body) {
        const existing = document.getElementById('push-toast'); if (existing) existing.remove();
        const toast = document.createElement('div'); toast.id = 'push-toast';
        toast.className = 'fixed top-4 left-1/2 -translate-x-1/2 z-[200] max-w-sm w-[90%] bg-slate-800 border border-blue-500/40 rounded-2xl shadow-2xl px-4 py-3 flex items-start gap-3 transition-all';
        toast.style.cssText = 'opacity:0; transform: translateX(-50%) translateY(-12px);';
        toast.innerHTML = `<div class="w-8 h-8 bg-blue-600 rounded-xl flex items-center justify-center shrink-0 mt-0.5"><svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg></div><div class="flex-1 min-w-0"><p class="text-white font-black text-xs uppercase tracking-wide">${title}</p><p class="text-slate-400 text-[11px] mt-0.5 leading-snug">${body}</p></div><button onclick="this.parentElement.remove()" class="text-slate-500 hover:text-white shrink-0 p-1">✕</button>`;
        document.body.appendChild(toast);
        requestAnimationFrame(() => { toast.style.transition = 'all 0.3s cubic-bezier(0.4,0,0.2,1)'; toast.style.opacity = '1'; toast.style.transform = 'translateX(-50%) translateY(0)'; });
        setTimeout(() => { if (!toast.parentElement) return; toast.style.opacity = '0'; toast.style.transform = 'translateX(-50%) translateY(-12px)'; setTimeout(() => toast.remove(), 300); }, 6000);
    }

    function handleNotificationDeepLink({ notifType, eventDate, eventId }) {
        switchView('schedule'); if (!eventDate) return;
        setTimeout(() => {
            if (isIOS) { goToDate(eventDate); updateDatePickerLabel(eventDate); }
            else {
                const slide = document.querySelector(`.day-slide[data-date="${eventDate}"]`) || Array.from(document.querySelectorAll('.day-slide')).find(s => s.dataset.date >= eventDate);
                if (slide) { scrollToSlideAndroid(slide, true); updateDatePickerLabel(eventDate); }
            }
            if ((notifType === 'venue_change' || notifType === 'faculty_change') && eventId) {
                setTimeout(() => { const idx = personalizedSchedule.findIndex(e => e.id === eventId); if (idx !== -1 && personalizedSchedule[idx].isDynamic) window.showDetails(eventDate, idx); }, 400);
            }
        }, 100);
    }

    function checkUrlDeepLink() {
        const params = new URLSearchParams(window.location.search), eventDate = params.get('date'), eventId = params.get('eventId');
        if (eventDate) { 
            handleNotificationDeepLink({ notifType: 'venue_change', eventDate, eventId }); 
            try { window.history.replaceState({}, '', window.location.pathname); } catch(e) {}
        }
    }

    // ═══════════════════════════════════════════════════════════════════════
    // BOOT
    // ═══════════════════════════════════════════════════════════════════════
    window.onload = initialize;
    window._swReg = null;

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', async () => {
            if (!window.location.protocol.startsWith('http')) {
                console.warn('ServiceWorker registration skipped: Unsupported protocol (' + window.location.protocol + ').');
                return;
            }
            try {
                const reg = await navigator.serviceWorker.register('./sw.js', { type: 'module' });
                console.log('✅ Consolidated SW Registered');
                window._swReg = reg;
            } catch (err) { console.error('❌ SW Registration Failed', err); }
        });
    }

    navigator.serviceWorker.addEventListener('message', (event) => {
        if (!event.data) return;
        if (event.data.type === 'SW_UPDATED') window.location.reload();
        if (event.data.type === 'NOTIFICATION_CLICK') handleNotificationDeepLink(event.data);
    });

</script>
