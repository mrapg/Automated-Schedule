<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>AFMC VII Term Schedule</title>
    <meta name="theme-color" content="#0f172a">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-180.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        /* ── Base Layout ─────────────────────────────────────────────────── */
        html, body {
            height: 100dvh; /* Use dynamic viewport height */
            overflow: hidden;
            overscroll-behavior: none; /* Modern way to prevent elastic bounce */
            /* position: fixed;  <-- REMOVE THIS line */
            width: 100%;
            margin: 0;
        }
        body {
            position: relative;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
            -webkit-text-size-adjust: 100%;
            background-color: #0f172a;
            color: #f8fafc;
        }
        /* ── App Shell ───────────────────────────────────────────────────── */
        #app-container {
            height: 100dvh;
            height: -webkit-fill-available; /* iOS < 15 fallback */
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        header {
            padding-top: calc(1rem + env(safe-area-inset-top)) !important;
            background-color: #0f172a;
        }

        /* ── Day Slide Carousel (horizontal swipe) ───────────────────────── */
        .day-view {
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
            flex: 1;
            height: 100%;
            overflow-x: auto;
            overflow-y: hidden;
            display: flex;
            scrollbar-width: none;
            /* touch-action: pan-x; <-- REMOVE OR CHANGE THIS to auto */
            touch-action: auto; 
            -webkit-overflow-scrolling: touch;
        }
        .day-view::-webkit-scrollbar { display: none; }

        .day-slide {
            scroll-snap-align: start;
            flex-shrink: 0;
            width: 100%;
            height: 100%;
            overflow-y: auto; /* Ensure this is set */
            overflow-x: hidden;
            overscroll-behavior-y: contain;
            -webkit-overflow-scrolling: touch; /* Required for momentum scrolling on older iOS */
            touch-action: auto; 
        }
        
        .day-slide::-webkit-scrollbar,
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .day-slide::-webkit-scrollbar-thumb,
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }

        /* ── Shared Components ───────────────────────────────────────────── */
        .card-shadow  { box-shadow: 0 10px 15px -3px rgba(0,0,0,0.4); }
        .modal-open   { overflow: hidden; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .bottom-nav-safe { padding-bottom: env(safe-area-inset-bottom); }

        /* ── Animations ──────────────────────────────────────────────────── */
        .pulse-icon { animation: pulse-blue 2s infinite; }
        @keyframes pulse-blue {
            0%, 100% { transform: scale(1);    opacity: 0.8; }
            50%       { transform: scale(1.05); opacity: 1;   }
        }
        .live-dot { animation: blink 1.5s infinite; }
        @keyframes blink {
            0%, 100% { opacity: 1;   transform: scale(1);   }
            50%       { opacity: 0.4; transform: scale(1.2); }
        }

        /* ── Topics Log (details/summary) ────────────────────────────────── */
        details > summary                    { list-style: none; cursor: pointer; }
        details > summary::-webkit-details-marker { display: none; }
        details[open] > summary .arrow       { transform: rotate(180deg); }

        /* ── Tab Transitions ─────────────────────────────────────────────── */
        .tab-content        { display: none; opacity: 0; transition: opacity 0.2s ease-in-out; }
        .tab-content.active { display: flex; opacity: 1; height: 100%; }

        /* ── Slide-up Panels (detail + cal day) ──────────────────────────── */
        #detail-panel {
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            will-change: transform;
            -webkit-overflow-scrolling: auto;
        }
        .panel-hidden  { transform: translateY(100%); }
        .panel-visible { transform: translateY(0); }

        /* ── PWA Install Banner ──────────────────────────────────────────── */
        #install-banner {
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            max-height: 0; opacity: 0; overflow: hidden;
        }
        #install-banner.visible { max-height: 150px; opacity: 1; padding: 1rem; }

        /* ── Calendar Overlay ────────────────────────────────────────────── */
        #calendar-overlay {
            transition: opacity 0.2s ease, transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #calendar-overlay.cal-hidden {
            opacity: 0;
            pointer-events: none;
            transform: translateY(-8px);
        }
        #calendar-overlay.cal-visible {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0);
        }

        /* ── Calendar Day Cells ──────────────────────────────────────────── */
        .cal-day-cell {
            min-height: 100px;
            cursor: pointer;
            transition: background 0.15s;
        }
        .cal-day-cell:active                      { background: rgba(255,255,255,0.06); }
        .cal-day-cell.today-cell .cal-day-num     { background: #2563eb; color: #fff; border-radius: 50%; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; }
        .cal-day-cell.other-month                 { opacity: 0.25; }
        .cal-day-cell.is-sunday .cal-day-num      { color: #fbbf24; }
        .cal-day-cell.is-holiday                  { background: rgba(251,191,36,0.07); }

        /* ── Calendar Event Chips ────────────────────────────────────────── */
        .event-chip {
            font-size: 7.5px;
            font-weight: 700;
            line-height: 1.25;
            padding: 1.5px 3px;
            border-radius: 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100%;
            display: block;
            text-transform: uppercase;
            letter-spacing: 0.01em;
            cursor: pointer;
            margin-bottom: 1.5px;
        }
        .chip-medicine  { background: #1d4ed8; color: #bfdbfe; }
        .chip-surgery   { background: #065f46; color: #a7f3d0; }
        .chip-obg       { background: #9f1239; color: #fecdd3; }
        .chip-paeds     { background: #9d174d; color: #fbcfe8; }
        .chip-ent       { background: #92400e; color: #fde68a; }
        .chip-ortho     { background: #7c2d12; color: #fed7aa; }
        .chip-ophthal   { background: #4c1d95; color: #ddd6fe; }
        .chip-derm      { background: #713f12; color: #fef08a; }
        .chip-psych     { background: #312e81; color: #c7d2fe; }
        .chip-anaes     { background: #164e63; color: #a5f3fc; }
        .chip-em        { background: #7f1d1d; color: #fca5a5; }
        .chip-elective  { background: #4c1d95; color: #e9d5ff; }
        .chip-holiday   { background: #14532d; color: #86efac; }
        .chip-radiology { background: #1f2937; color: #d1d5db; }
        .chip-default   { background: #1e293b; color: #94a3b8; }

        /* ── Calendar Carousel Slides ────────────────────────────────────── */
        .cal-month-slide { scrollbar-width: none; -webkit-overflow-scrolling: touch; }
        .cal-month-slide::-webkit-scrollbar { display: none; }
        #cal-swipe-wrapper { touch-action: pan-x pan-y; }
    </style>
</head>

<body class="transition-colors duration-200">

    <!-- ── Offline Banner ──────────────────────────────────────────────── -->
    <div id="offline-notice" class="hidden bg-amber-600 text-white text-[10px] font-black uppercase tracking-widest text-center py-1 sticky top-0 z-[110]">
        Viewing Offline Cache
    </div>

    <!-- ── PWA Install Banner ──────────────────────────────────────────── -->
    <div id="install-banner" class="bg-blue-900/40 border-b border-blue-500/30 backdrop-blur-md sticky top-0 z-[100] max-w-lg mx-auto">
        <div class="flex items-center justify-between gap-4">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shrink-0 shadow-lg shadow-blue-900/50">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
                    </svg>
                </div>
                <div class="pr-2">
                    <p class="text-[11px] font-black uppercase tracking-widest text-white">AFMC Schedule</p>
                    <p id="install-text" class="text-[9px] text-blue-300 font-bold uppercase tracking-tighter">Install for offline access</p>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <button id="install-btn" class="bg-blue-600 text-white text-[10px] font-black uppercase tracking-widest px-4 py-2 rounded-lg shadow-lg active:scale-95 transition-transform">Install</button>
                <button id="close-install-banner" class="p-2 text-slate-400 hover:text-white">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <!-- ── Onboarding Overlay ───────────────────────────────────────────── -->
    <div id="onboarding-overlay" class="fixed inset-0 bg-slate-950/80 backdrop-blur-md z-[120] flex items-center justify-center p-6 hidden">
        <div class="bg-slate-900 rounded-3xl p-10 max-w-sm w-full shadow-2xl text-center border border-slate-800">
            <div class="mb-6 flex justify-center">
                <div class="w-20 h-20 bg-blue-500/20 rounded-2xl flex items-center justify-center border border-blue-500/30 pulse-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-blue-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 2l3 3.5-3 3.5-3-3.5L12 2z M12 9l4 10-4 3-4-3 4-10"/>
                    </svg>
                </div>
            </div>
            <h2 class="text-3xl font-black text-white mb-2 tracking-tight uppercase">Welcome, Cadet</h2>
            <p class="text-slate-400 mb-2 font-medium leading-relaxed uppercase text-[10px] tracking-widest text-blue-400">VII Term Duration</p>
            <p class="text-white mb-8 font-black text-lg">12 JAN - 17 MAY 2026</p>
            <div class="relative mb-8">
                <input type="number" id="init-roll-input" placeholder="001" min="1" max="150"
                    class="w-full p-5 bg-slate-800 border-2 border-slate-700 rounded-2xl text-center text-4xl font-black focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 outline-none text-white transition-all placeholder-slate-600">
                <label class="absolute -top-3 left-1/2 -translate-x-1/2 bg-slate-900 px-3 text-[10px] font-black text-blue-500 uppercase tracking-widest border border-slate-800 rounded-full">AFMC Roll No</label>
            </div>
            <div id="onboarding-error" class="hidden mb-4 text-xs font-bold text-red-500 uppercase tracking-tighter">Please enter roll (1-150)</div>
            <button id="start-btn" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black text-xl hover:bg-blue-700 transition transform active:scale-95 shadow-xl shadow-blue-500/20 uppercase tracking-widest">View My Schedule</button>
        </div>
    </div>

    <!-- ── Event Detail Panel (bottom sheet) ────────────────────────────── -->
    <div id="detail-overlay" class="fixed inset-0 bg-slate-950/80 z-[130] hidden transition-opacity">
        <div id="detail-panel" class="fixed bottom-0 left-0 right-0 max-w-lg mx-auto bg-slate-900 rounded-t-[40px] border-t border-slate-700 p-8 panel-hidden shadow-[0_-20px_50px_-12px_rgba(0,0,0,0.5)]">
            <div id="detail-drag-zone" class="w-full flex justify-center py-6 -mt-8 mb-2 cursor-grab active:cursor-grabbing touch-none">
                <div class="w-12 h-1.5 bg-slate-700 rounded-full"></div>
            </div>
            <div id="detail-content"></div>
            <button id="close-detail" class="w-full mt-8 bg-slate-800 text-slate-300 py-4 rounded-2xl font-black uppercase tracking-widest text-xs border border-slate-700 active:scale-95 transition-transform">Close Details</button>
        </div>
    </div>

    <!-- ── Calendar Month View Overlay ──────────────────────────────────── -->
    <div id="calendar-overlay" class="cal-hidden fixed inset-0 bg-slate-950/98 z-[115] flex flex-col max-w-lg mx-auto">

        <!-- Header: close | ‹ MONTH YEAR › | Today -->
        <div class="bg-slate-950 border-b border-slate-800 px-3 py-2.5 flex items-center justify-between shrink-0">
            <button id="cal-close-btn" class="p-2 rounded-xl bg-slate-800 text-slate-300 active:scale-95 transition-transform shrink-0">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
            <div class="flex items-center gap-2 flex-1 justify-center">
                <button id="cal-prev-btn" class="p-1.5 rounded-lg text-slate-400 active:text-white active:scale-95 transition-all font-black text-xl leading-none select-none">‹</button>
                <h2 id="cal-month-label" class="text-sm font-black text-white uppercase tracking-widest text-center min-w-[130px]"></h2>
                <button id="cal-next-btn" class="p-1.5 rounded-lg text-slate-400 active:text-white active:scale-95 transition-all font-black text-xl leading-none select-none">›</button>
            </div>
            <button id="cal-today-btn" class="px-2.5 py-1.5 bg-blue-600 text-white text-[9px] font-black uppercase tracking-widest rounded-lg active:scale-95 transition-transform shrink-0">Today</button>
        </div>

        <!-- Day-of-week labels -->
        <div class="grid grid-cols-7 bg-slate-900 border-b border-slate-800 shrink-0">
            <div class="text-[9px] font-black text-slate-500 uppercase tracking-widest text-center py-2">M</div>
            <div class="text-[9px] font-black text-slate-500 uppercase tracking-widest text-center py-2">T</div>
            <div class="text-[9px] font-black text-slate-500 uppercase tracking-widest text-center py-2">W</div>
            <div class="text-[9px] font-black text-slate-500 uppercase tracking-widest text-center py-2">T</div>
            <div class="text-[9px] font-black text-slate-500 uppercase tracking-widest text-center py-2">F</div>
            <div class="text-[9px] font-black text-slate-500 uppercase tracking-widest text-center py-2">S</div>
            <div class="text-[9px] font-black text-red-400/80 uppercase tracking-widest text-center py-2">S</div>
        </div>

        <!-- Swipeable 3-slide month carousel -->
        <div id="cal-swipe-wrapper" class="flex-1 overflow-hidden relative touch-pan-y">
            <div id="cal-carousel" class="flex h-full" style="transition: transform 0.3s cubic-bezier(0.4,0,0.2,1); will-change: transform;">
                <div class="cal-month-slide flex-shrink-0 w-full h-full overflow-y-auto bg-slate-900" id="cal-slide-0">
                    <div class="cal-grid-inner grid grid-cols-7 gap-px bg-slate-800/60 p-px"></div>
                </div>
                <div class="cal-month-slide flex-shrink-0 w-full h-full overflow-y-auto bg-slate-900" id="cal-slide-1">
                    <div class="cal-grid-inner grid grid-cols-7 gap-px bg-slate-800/60 p-px"></div>
                </div>
                <div class="cal-month-slide flex-shrink-0 w-full h-full overflow-y-auto bg-slate-900" id="cal-slide-2">
                    <div class="cal-grid-inner grid grid-cols-7 gap-px bg-slate-800/60 p-px"></div>
                </div>
            </div>
        </div>

        <!-- Day detail panel backdrop -->
        <div id="cal-day-backdrop" class="absolute inset-0 bg-slate-950/60 z-[9] opacity-0 pointer-events-none transition-opacity duration-300"></div>

        <!-- Day detail panel (slides up on day tap) -->
        <div id="cal-day-panel" class="absolute inset-x-0 bottom-0 bg-slate-900 rounded-t-[40px] border-t border-slate-700 shadow-[0_-20px_50px_-12px_rgba(0,0,0,0.5)] panel-hidden z-10" style="max-height: 62%;">
            <div id="cal-day-panel-handle" class="flex justify-center pt-3 pb-1 cursor-grab active:cursor-grabbing touch-none shrink-0">
                <div class="w-10 h-1 bg-slate-700 rounded-full"></div>
            </div>
            <div class="flex items-center justify-between px-5 py-2 border-b border-slate-800 shrink-0">
                <div>
                    <p id="cal-day-panel-date"  class="text-xs font-black text-blue-400 uppercase tracking-widest"></p>
                    <p id="cal-day-panel-count" class="text-[9px] text-slate-500 font-bold uppercase tracking-widest mt-0.5"></p>
                </div>
                <button id="cal-day-panel-goto" class="px-3 py-1.5 bg-slate-800 text-slate-300 text-[9px] font-black uppercase tracking-widest rounded-lg border border-slate-700 active:scale-95 transition-transform">
                    Go to Day →
                </button>
            </div>
            <div id="cal-day-panel-events" class="overflow-y-auto px-4 py-3 space-y-2" style="max-height: calc(62vh - 90px); -webkit-overflow-scrolling: touch;"></div>
        </div>

        <!-- Legend -->
        <div id="cal-legend" class="bg-slate-950 border-t border-slate-800 px-4 py-2 flex flex-wrap gap-2 shrink-0"></div>
    </div>

    <!-- ── Main App Container ────────────────────────────────────────────── -->
    <div id="app-container" class="max-w-lg mx-auto bg-slate-900 shadow-2xl h-screen flex flex-col border-x border-slate-800 overflow-hidden relative">

        <!-- App Header -->
        <header class="bg-slate-950 text-white p-4 sticky top-0 z-[50] border-b border-slate-800 shadow-lg shrink-0">
            <div class="flex justify-between items-center">
                <div>
                    <h1 class="text-xl font-black tracking-tight flex items-center gap-2">
                        <span class="text-blue-400">AFMC</span> Schedule
                    </h1>
                    <p id="user-info-display" class="text-[9px] text-blue-400/70 uppercase font-black tracking-[0.2em] mt-0.5"></p>
                </div>
                <button id="change-roll-btn" class="px-3 py-1.5 bg-slate-800 rounded-lg hover:bg-slate-700 flex items-center gap-2 transition-all border border-slate-700 active:scale-95 group">
                    <span class="text-[10px] font-black uppercase tracking-wider text-blue-100">Roll No.</span>
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5 text-blue-400 group-hover:scale-110 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                    </svg>
                </button>
            </div>
        </header>

        <!-- ── View 1: Schedule ─────────────────────────────────────────── -->
        <div id="schedule-tab-content" class="tab-content active flex-col flex-1 h-full overflow-hidden relative">

            <!-- Controls bar -->
            <div class="p-3 bg-slate-950 border-b border-slate-800 space-y-2 z-10 shadow-lg shrink-0">
                <!-- Row 1: Today | Calendar View -->
                <div class="flex space-x-2">
                    <button id="today-btn" class="flex-1 bg-blue-600 btn-glow-blue text-white font-black py-2.5 rounded-xl shadow-lg flex items-center justify-center hover:bg-blue-700 active:scale-95 transition-all uppercase tracking-widest text-[10px]">
                        Today
                    </button>
                    <div class="relative flex-1 bg-slate-900 border border-slate-700 rounded-xl flex items-center justify-center px-3 hover:border-violet-500 hover:bg-violet-900/20 transition-all cursor-pointer overflow-hidden group">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-violet-400 mr-2 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                        </svg>
                        <span id="date-picker-label" class="text-[10px] font-black text-slate-200 uppercase tracking-tighter">Date</span>
                        <input type="date" id="date-picker" class="absolute inset-0 opacity-0 cursor-pointer" style="display:none">
                        <button id="open-calendar-btn" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" aria-label="Open calendar view"></button>
                    </div>
                </div>
                <!-- Row 2: Dept filter | Add to Calendar -->
                <div class="flex space-x-2">
                    <div class="relative flex-1 bg-slate-900 border border-slate-700 rounded-xl flex items-center justify-center px-3 hover:border-blue-500 transition-all cursor-pointer group">
                        <select id="dept-filter" class="absolute inset-0 opacity-0 cursor-pointer w-full h-full z-20 bg-slate-950 text-white outline-none">
                            <option value="all">ALL DEPTS</option>
                        </select>
                        <span id="dept-filter-label" class="text-[9px] font-black text-slate-200 uppercase tracking-tighter truncate max-w-[70px]">All Depts</span>
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3 text-slate-500 ml-1 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M19 9l-7 7-7-7"/>
                        </svg>
                    </div>
                    <button id="add-to-calendar-btn" class="flex-[1.5] bg-emerald-600 btn-glow-green text-white font-black py-2.5 rounded-xl shadow-lg hover:bg-emerald-700 active:scale-95 transition-all flex items-center justify-center uppercase tracking-widest text-[9px]">
                        Add to Calendar
                    </button>
                </div>
            </div>

            <!-- Loading spinner -->
            <div id="loading-indicator" class="text-center p-24 hidden absolute inset-0 z-50 bg-slate-900">
                <div class="inline-block w-10 h-10 border-4 border-blue-600/20 border-t-blue-600 rounded-full animate-spin mb-4 mt-20"></div>
                <p class="text-slate-500 font-black text-[10px] tracking-[0.3em] uppercase">Generating</p>
            </div>

            <!-- Slides container -->
            <div id="day-view-container" class="day-view flex-1 bg-slate-900 w-full relative"></div>

            <!-- Week range footer -->
            <div class="bg-slate-950/80 backdrop-blur border-t border-slate-800 p-2 text-center shrink-0 z-20 absolute bottom-0 w-full pointer-events-none">
                <p id="current-week-display" class="text-[9px] font-black text-blue-400 uppercase tracking-widest h-3.5"></p>
            </div>
        </div>

        <!-- ── View 2: Topics Log ────────────────────────────────────────── -->

    function addEntry(data, date, timeRange, topic, dept, loc) {
        const [start, end] = timeRange.split('-');
        data.push({ date, startTime: start, endTime: end, topic, department: normalizeDept(dept), location: loc, isDynamic: false });
    }

    function generateSchedule(gBatch, cBatch, sBatch, dynamicEvents = []) {
        const data   = [];
        let current  = new Date(termStartDate);
        const eStart = new Date(electivePeriod.start + 'T00:00:00Z');
        const eEnd   = new Date(electivePeriod.end   + 'T00:00:00Z');

        while (current <= termEndDate) {
            const dayName    = current.toLocaleDateString('en-US', { weekday: 'long', timeZone: 'UTC' });
            const ds         = current.toISOString().split('T')[0];
            const isElective = current >= eStart && current <= eEnd;
            const week       = getNthWeekdayOfMonth(current);
            const rules      = scheduleRules[dayName];

            // Dynamic events relevant to this user on this day
            const myDynamic = dynamicEvents.filter(e => {
                if (e.date !== ds) return false;
                const batches = Array.isArray(e.batch) ? e.batch : [e.batch];
                if (batches.includes("ALL")) return true;
                if (e.isClinics || e.isClinic) return batches.includes(cBatch);
                return batches.includes(gBatch) || batches.includes(sBatch);
            });

            myDynamic.forEach(e => {
                const entry = { ...e, department: normalizeDept(e.department) };
                if (!entry.topic || entry.topic.trim().toUpperCase() !== "NULL") data.push(entry);
            });

            const dynamicTimes    = new Set(myDynamic.map(e => e.startTime));
            const isGlobalHoliday = dynamicEvents.some(e =>
                e.date === ds && e.isHoliday &&
                (Array.isArray(e.batch) ? e.batch.includes("ALL") : e.batch == "ALL")
            );
            const isOverridden = (range) => dynamicTimes.has(range.split('-')[0]);

            if (dayName !== "Sunday" && rules && !isGlobalHoliday) {
                if (!isElective) {
                    // Theory lectures
                    for (const [time, cfg] of Object.entries(rules.theory || {})) {
                        const topic = typeof cfg === 'string' ? cfg : cfg[week];
                        if (topic && !isOverridden(time)) addEntry(data, ds, time, topic, topic, "NLH Sushruta");
                    }
                    // Pandemic module
                    if (rules.pandemic && !isOverridden("09:00")) {
                        for (const [time, topic] of Object.entries(rules.pandemic))
                            addEntry(data, ds, time, topic, "Internal Medicine", "NLH Sushruta");
                    }
                    // Clinical rotations
                    clinicalRotationRules.forEach(rot => {
                        const s = new Date(rot.startDate + 'T00:00:00Z');
                        const e = new Date(rot.endDate   + 'T00:00:00Z');
                        if (current >= s && current <= e && rot.batch === cBatch && !isOverridden("11:00"))
                            addEntry(data, ds, "11:00-13:00", `${rot.department} Clinics`, rot.department, "OPD/Ward");
                    });
                    // Tutorials
                    for (const [time, cfg] of Object.entries(rules.tutorials || {})) {
                        if (typeof cfg === 'string') {
                            if (!isOverridden(time)) addEntry(data, ds, time, `${cfg} Tutorial`, cfg, "NLH Sushruta");
                        } else if (cfg[week] && !Object.values(cfg).some(v => v === 'A' || v === 'B' || v === 'C')) {
                            if (!isOverridden(time)) addEntry(data, ds, time, `${cfg[week]} Tutorial`, cfg[week], "NLH Sushruta");
                        } else {
                            for (const [topic, target] of Object.entries(cfg)) {
                                if ((target === gBatch || (typeof target === 'number' && target === week)) && !isOverridden(time))
                                    addEntry(data, ds, time, `${topic} Tutorial`, topic, "Tutorial Room");
                            }
                        }
                    }
                    // SDL
                    for (const [time, cfg] of Object.entries(rules.sdl || {})) {
                        const topic = cfg[week];
                        if (topic && !isOverridden(time))
                            (Array.isArray(topic) ? topic : [topic]).forEach(t => addEntry(data, ds, time, `SDL ${t}`, t, "Library/Dept"));
                    }
                } else {
                    // Elective period
                    if (!isOverridden("11:00")) addEntry(data, ds, "11:00-13:00", "Elective Rotation", "Electives", "Clinical Dept");
                }
            }
            current.setUTCDate(current.getUTCDate() + 1);
        }

        personalizedSchedule = data;

        // Populate dept filter dropdown
        const select = document.getElementById('dept-filter');
        const depts  = [...new Set(data.map(e => e.department).filter(Boolean))].sort();
        select.innerHTML = '<option value="all">ALL DEPTS</option>';
        depts.forEach(d => {
            const opt = document.createElement('option');
            opt.value = d; opt.textContent = d.toUpperCase();
            select.appendChild(opt);
        });
    }

    // ═══════════════════════════════════════════════════════════════════════
    // SCHEDULE RENDER (day slides)
    // ═══════════════════════════════════════════════════════════════════════
    function render() {
        const container = document.getElementById('day-view-container');
        container.innerHTML = '';
        const todayStr = getTodayStr();
        let cur = new Date(termStartDate);

        while (cur <= termEndDate) {
            const ds            = cur.toISOString().split('T')[0];
            const dayEvents     = personalizedSchedule.filter(e => e.date === ds);
            const filteredEvents = currentFilter === 'all' ? dayEvents : dayEvents.filter(e => e.department === currentFilter);

            if (currentFilter === 'all' || filteredEvents.length > 0) {
                const slide = document.createElement('div');
                slide.className = 'day-slide p-5 pb-24 overflow-y-auto';
                slide.dataset.date = ds;
                const isToday = ds === todayStr;

                slide.innerHTML = `<h2 class="text-4xl font-black mb-8 flex items-center ${isToday ? 'text-blue-400 border-l-8 border-blue-600 pl-5' : 'text-slate-100'} tracking-tighter">
                    ${isToday ? '<span class="w-3 h-3 bg-blue-500 rounded-full mr-4 live-dot"></span>' : ''}
                    ${cur.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric', timeZone: 'UTC' }).toUpperCase()}
                </h2>`;

                const sorted = filteredEvents.sort((a,b) => (a.startTime||'00:00').localeCompare(b.startTime||'00:00'));

                if (sorted.length) {
                    const holiday = sorted.find(e => e.isHoliday);
                    if (holiday) {
                        slide.innerHTML += `<div class="bg-slate-800/50 p-16 rounded-[40px] text-center text-slate-600 font-black text-sm border-4 border-dotted border-slate-700 uppercase tracking-[0.2em]">${holiday.topic || 'HOLIDAY'}</div>`;
                    } else {
                        slide.innerHTML += sorted.map(e => {
                            const idx = personalizedSchedule.indexOf(e);
                            return `
                            <div class="bg-slate-800 border-l-[10px] ${getDeptStyles(e.department)} p-6 mb-6 card-shadow rounded-r-3xl border border-slate-700 overflow-hidden transition-all transform ${e.isDynamic ? 'clickable-card cursor-pointer hover:bg-slate-700 active:scale-95' : ''}"
                                ${e.isDynamic ? `onclick="window.showDetails('${ds}', ${idx})"` : ''}>
                                <div class="flex justify-between items-start gap-3 flex-nowrap">
                                    <div class="flex-1 min-w-0">
                                        <div class="flex items-center gap-2 mb-1.5 flex-wrap">
                                            <p class="font-black text-slate-50 leading-[1.1] text-2xl uppercase tracking-tighter line-clamp-2">${e.topic}</p>
                                            ${e.isDynamic ? '<span class="text-[8px] bg-blue-500/20 text-blue-400 px-1.5 py-0.5 rounded font-black tracking-widest uppercase shrink-0">Details</span>' : ''}
                                        </div>
                                        <p class="text-[10px] opacity-70 uppercase font-black tracking-widest truncate">${e.department}</p>
                                    </div>
                                    <div class="text-right flex flex-col items-end shrink-0 ml-1">
                                        <div class="bg-blue-700 text-white px-4 py-2 rounded-2xl text-lg sm:text-xl font-black shadow-xl shadow-slate-900/40 mb-1.5 leading-none whitespace-nowrap">${e.startTime}</div>
                                        <p class="text-[10px] text-slate-400 uppercase font-black tracking-tighter">TO ${e.endTime}</p>
                                    </div>
                                </div>
                                ${e.location ? `<div class="mt-6 flex items-center text-[12px] font-black text-slate-400 border-t border-slate-700 pt-4 uppercase tracking-widest"><span>📍 ${e.location}</span></div>` : ''}
                            </div>`;
                        }).join('');
                    }
                } else {
                    const msg = cur.getUTCDay() === 0 ? '🌞 SUNDAY' : 'REST DAY';
                    slide.innerHTML += `<div class="bg-slate-800/50 p-16 rounded-[40px] text-center text-slate-600 font-black text-sm border-4 border-dotted border-slate-700 uppercase tracking-[0.2em]">${msg}</div>`;
                }

                container.appendChild(slide);
            }
            cur.setUTCDate(cur.getUTCDate() + 1);
        }

        // IntersectionObserver to track visible date & update week label
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (!entry.isIntersecting) return;
                const ds    = entry.target.dataset.date;
                currentlyVisibleDate = ds;
                const date  = new Date(ds + 'T00:00:00Z');
                const start = getStartOfWeek(date);
                const end   = new Date(start); end.setUTCDate(start.getUTCDate() + 6);
                document.getElementById('current-week-display').textContent =
                    `${start.toLocaleDateString('en-US',{month:'short',day:'numeric',timeZone:'UTC'})} - ${end.toLocaleDateString('en-US',{month:'short',day:'numeric',timeZone:'UTC'})}, 2026`.toUpperCase();
            });
        }, { threshold: 0.5, root: container });

        document.querySelectorAll('.day-slide').forEach(s => observer.observe(s));

        // Scroll to today (or nearest future date)
        const allSlides  = Array.from(document.querySelectorAll('.day-slide'));
        const target     = allSlides.find(s => s.dataset.date >= todayStr);
        const fallback   = allSlides[allSlides.length - 1];
        scrollToSlide(target || fallback, false);
    }

    // ═══════════════════════════════════════════════════════════════════════
    // TOPICS LOG
    // ═══════════════════════════════════════════════════════════════════════
    function generateTopicsLog() {
        const todayStr    = getTodayStr();
        const container   = document.getElementById('log-container');
        container.innerHTML = '';

        const pastEvents = personalizedSchedule.filter(e => {
            if (e.date > todayStr) return false;
            if (!e.topic || e.topic.toUpperCase() === 'NULL' || e.topic.toUpperCase().includes('CANCEL')) return false;
            if (e.isHoliday) return false;
            if (e.startTime && parseInt(e.startTime) >= 10 && parseInt(e.startTime) < 13) return false;
            return true;
        });

        cachedLogData = pastEvents;
        if (window.Fuse) logFuse = new Fuse(pastEvents, { keys: ['topic','department'], threshold: 0.3 });

        const grouped = pastEvents.reduce((acc, e) => {
            const dept = e.department || 'Other';
            (acc[dept] = acc[dept] || []).push(e);
            return acc;
        }, {});

        const deptStats = Object.keys(grouped).map(dept => {
            const uniqueMap = new Map();
            grouped[dept].forEach(e => {
                const t = e.topic.trim();
                if (!uniqueMap.has(t)) uniqueMap.set(t, { topic: t, dates: [] });
                uniqueMap.get(t).dates.push(e.date);
            });
            const uniqueList = Array.from(uniqueMap.values()).sort((a, b) => {
                const maxA = a.dates.reduce((m,d) => d>m?d:m, '');
                const maxB = b.dates.reduce((m,d) => d>m?d:m, '');
                return maxB.localeCompare(maxA);
            });
            return { dept, uniqueTopics: uniqueList, count: uniqueList.length };
        }).sort((a, b) => b.count - a.count);

        if (deptStats.length === 0) {
            container.innerHTML = `<div class="text-center text-slate-500 font-bold mt-10 uppercase tracking-widest text-xs">No completed classes yet.</div>`;
            return;
        }

        deptStats.forEach(({ dept, uniqueTopics, count }) => {
            container.innerHTML += `
                <details class="group bg-slate-800 rounded-xl border border-slate-700 overflow-hidden mb-3 open:border-blue-500/50 transition-colors">
                    <summary class="flex justify-between items-center p-4 bg-slate-800 hover:bg-slate-750 select-none">
                        <div class="flex items-center gap-3">
                            <div class="w-2 h-8 rounded-full ${getDeptColorClass(dept)}"></div>
                            <div>
                                <h3 class="font-black text-white text-sm uppercase tracking-wide leading-none">${dept}</h3>
                                <p class="text-[9px] text-slate-400 font-bold uppercase tracking-widest mt-1">${count} Topics Completed</p>
                            </div>
                        </div>
                        <svg xmlns="http://www.w3.org/2000/svg" class="arrow h-5 w-5 text-slate-500 transition-transform duration-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                        </svg>
                    </summary>
                    <div class="p-2 space-y-2 bg-slate-900/50 border-t border-slate-700/50">
                        ${uniqueTopics.map(e => `
                            <div class="p-3 bg-slate-800 rounded-lg flex items-center gap-3 border border-slate-700/50 ml-2">
                                <div class="flex-1">
                                    <p class="text-xs font-bold text-slate-200 leading-snug uppercase tracking-tight">${e.topic}</p>
                                    <p class="text-[9px] font-bold uppercase tracking-widest text-slate-500 mt-1">${e.dates.sort().reverse().map(formatDate).join(' • ')}</p>
                                </div>
                            </div>`).join('')}
                    </div>
                </details>`;
        });
    }

    function renderSearchResults(query) {
        const container = document.getElementById('log-container');
        if (!query || !logFuse) { generateTopicsLog(); return; }
        const results = logFuse.search(query);
        container.innerHTML = '';
        if (!results.length) {
            container.innerHTML = `<div class="text-center text-slate-500 font-bold mt-10 uppercase tracking-widest text-xs">No topics found for "${query}"</div>`;

        results.forEach(({ item: e }) => {

                        <span class="text-[9px] font-black uppercase tracking-widest px-1.5 py-0.5 rounded bg-slate-700 text-slate-300 whitespace-nowrap">${e.department}</span>
                    </div>
                    <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">${formatDate(e.date)} • ${e.startTime}</p>

    // CALENDAR VIEW

    function openCalendar() {
        const d = new Date(currentlyVisibleDate + 'T00:00:00Z');
        calCurrentYear  = d.getUTCFullYear();
        calCurrentMonth = d.getUTCMonth();
        renderAllCalSlides();
        const ov = document.getElementById('calendar-overlay');
        ov.classList.remove('cal-hidden');
        ov.classList.add('cal-visible');
    }

    function closeCalendar() {
        closeCalDayPanel();
        const ov = document.getElementById('calendar-overlay');
        ov.classList.remove('cal-visible');
        ov.classList.add('cal-hidden');
    }

    function offsetMonth(year, month, delta) {
        let m = month + delta, y = year;
        while (m > 11) { m -= 12; y++; }
        while (m < 0)  { m += 12; y--; }
        return { year: y, month: m };
    }

    function renderMonthIntoSlide(slideIndex, year, month) {
        const slide = document.getElementById(`cal-slide-${slideIndex}`);
        const grid  = slide.querySelector('.cal-grid-inner');
        grid.innerHTML = '';
        slide.scrollTop = 0;

        const todayStr = getTodayStr();
        const eventMap = {};
        personalizedSchedule.forEach(e => {
            (eventMap[e.date] = eventMap[e.date] || []).push(e);
        });

        const firstDay    = new Date(Date.UTC(year, month, 1));
        const totalDays   = new Date(Date.UTC(year, month + 1, 0)).getUTCDate();
        const startOffset = (firstDay.getUTCDay() + 6) % 7;
        const legendDepts = new Set();

        for (let i = 0; i < startOffset; i++) {
            const d  = new Date(Date.UTC(year, month, 1 - startOffset + i));
            const ds = d.toISOString().split('T')[0];
            grid.appendChild(buildDayCell(ds, d.getUTCDate(), true, eventMap[ds]||[], todayStr, legendDepts));
        }
        for (let d = 1; d <= totalDays; d++) {
            const ds = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            grid.appendChild(buildDayCell(ds, d, false, eventMap[ds]||[], todayStr, legendDepts));
        }
        const remainder = (startOffset + totalDays) % 7;
        if (remainder !== 0) {
            for (let i = 1; i <= 7 - remainder; i++) {
                const d  = new Date(Date.UTC(year, month + 1, i));
                const ds = d.toISOString().split('T')[0];
                grid.appendChild(buildDayCell(ds, d.getUTCDate(), true, eventMap[ds]||[], todayStr, legendDepts));
            }
        }
        return legendDepts;
    }

    function renderAllCalSlides() {
        const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
        document.getElementById('cal-month-label').textContent = `${MONTHS[calCurrentMonth]} ${calCurrentYear}`;

        const prev = offsetMonth(calCurrentYear, calCurrentMonth, -1);
        const next = offsetMonth(calCurrentYear, calCurrentMonth, +1);
        renderMonthIntoSlide(0, prev.year, prev.month);
        const legendDepts = renderMonthIntoSlide(1, calCurrentYear, calCurrentMonth);
        renderMonthIntoSlide(2, next.year, next.month);

        const carousel = document.getElementById('cal-carousel');
        carousel.style.transition = 'none';
        carousel.style.transform  = 'translateX(-100%)';
        renderCalLegend(legendDepts);
    }

    function commitMonthShift(direction) {
        if (calIsAnimating) return;
        calIsAnimating = true;
        closeCalDayPanel();
        const carousel = document.getElementById('cal-carousel');
        carousel.style.transition = 'transform 0.3s cubic-bezier(0.4,0,0.2,1)';
        carousel.style.transform  = direction === 1 ? 'translateX(-200%)' : 'translateX(0%)';
        carousel.addEventListener('transitionend', function handler() {
            carousel.removeEventListener('transitionend', handler);
            const shifted   = offsetMonth(calCurrentYear, calCurrentMonth, direction);
            calCurrentYear  = shifted.year;
            calCurrentMonth = shifted.month;
            renderAllCalSlides();
            calIsAnimating = false;
        }, { once: true });
    }

    function buildDayCell(dateStr, dayNum, isOtherMonth, events, todayStr, legendDepts) {
        const cell       = document.createElement('div');
        const isToday    = dateStr === todayStr;
        const dow        = new Date(dateStr + 'T00:00:00Z').getUTCDay();
        const isSunday   = dow === 0;
        const inTerm     = dateStr >= '2026-01-12' && dateStr <= '2026-05-17';
        const holiday    = events.find(e => e.isHoliday);

        cell.className = [
            'cal-day-cell bg-slate-900 p-1.5 flex flex-col',
            isOtherMonth ? 'other-month' : '',
            isToday      ? 'today-cell'  : '',
            isSunday     ? 'is-sunday'   : '',
            holiday      ? 'is-holiday'  : ''
        ].join(' ');
        cell.dataset.date = dateStr;

        // Day number
        const numEl = document.createElement('div');
        numEl.className = [
            'cal-day-num text-[11px] font-black mb-1',
            isSunday     ? 'text-amber-400' : 'text-slate-300',
            isOtherMonth ? '!text-slate-600' : '',
            isToday      ? '!text-white'    : ''
        ].join(' ');
        numEl.textContent = dayNum;
        cell.appendChild(numEl);

        if (holiday && !isOtherMonth) {
            legendDepts.add('__holiday__');
            const banner = document.createElement('div');
            banner.className = 'rounded bg-amber-400/20 border border-amber-400/40 px-1 py-1 text-center mb-1';
            banner.innerHTML = `<div class="text-base leading-none mb-0.5">🎉</div><span class="text-[8px] font-black text-amber-300 uppercase tracking-wide block leading-tight">${(holiday.topic||'Holiday').replace(/Holiday/i,'').trim()||'Holiday'}</span>`;
            cell.appendChild(banner);
        } else if (isSunday && !isOtherMonth) {
            const sun = document.createElement('div');
            sun.className = 'text-center text-base leading-none mb-1';
            sun.textContent = '☀️';
            cell.appendChild(sun);
        } else if (inTerm && !isOtherMonth) {
            const sorted = [...events].sort((a,b) => (a.startTime||'').localeCompare(b.startTime||''));
            sorted.slice(0, 4).forEach(e => {
                const dept = e.department || 'Other';
                legendDepts.add(dept);
                const chip = document.createElement('span');
                chip.className = `event-chip ${getChipClass(dept)}`;
                chip.textContent = (e.topic || dept).replace(/Tutorial|SDL|Clinics/gi, '').trim() || dept;
                cell.appendChild(chip);
            });
            if (sorted.length > 4) {
                const more = document.createElement('span');
                more.className = 'text-[8px] font-black text-slate-500 pl-0.5 mt-0.5';
                more.textContent = `+${sorted.length - 4} more`;
                cell.appendChild(more);
            }
        }

        cell.addEventListener('click', () => openCalDayPanel(dateStr, events));
        return cell;
    }

    // ── Swipe & Trackpad Navigation ─────────────────────────────────────
    function setupCalSwipe() {
        const wrapper  = document.getElementById('cal-swipe-wrapper');
        const carousel = document.getElementById('cal-carousel');

        // Touch
        let touchStartX = 0, touchStartY = 0, touchDeltaX = 0;
        let isSwiping = false, isVertical = false;

        wrapper.addEventListener('touchstart', (e) => {
            if (calIsAnimating) return;
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
            touchDeltaX = 0; isSwiping = true; isVertical = false;
            carousel.style.transition = 'none';
        }, { passive: true });

        wrapper.addEventListener('touchmove', (e) => {
            if (!isSwiping || calIsAnimating) return;
            const dx = e.touches[0].clientX - touchStartX;
            const dy = e.touches[0].clientY - touchStartY;
            if (!isVertical && Math.abs(dy) > Math.abs(dx) && Math.abs(dy) > 8) { isVertical = true; }
            if (isVertical) return;
            if (Math.abs(dx) > 5) {
                e.preventDefault();
                touchDeltaX = dx;
                carousel.style.transform = `translateX(calc(-100% + ${dx}px))`;
            }
        }, { passive: false });

        wrapper.addEventListener('touchend', () => {
            if (!isSwiping || calIsAnimating || isVertical) { isSwiping = false; return; }
            isSwiping = false;
            const threshold = wrapper.offsetWidth * 0.25;
            if      (touchDeltaX < -threshold) commitMonthShift(+1);
            else if (touchDeltaX >  threshold) commitMonthShift(-1);
            else { carousel.style.transition = 'transform 0.25s cubic-bezier(0.4,0,0.2,1)'; carousel.style.transform = 'translateX(-100%)'; }
        }, { passive: true });

        // Trackpad / mouse wheel
        let wheelAccumX = 0, wheelAccumY = 0, wheelTimer = null;
        const WHEEL_THRESHOLD = 60;

        wrapper.addEventListener('wheel', (e) => {
            if (calIsAnimating) return;
            wheelAccumX += e.deltaX;
            wheelAccumY += e.deltaY;
            if (Math.abs(wheelAccumY) > Math.abs(wheelAccumX) * 1.5) { wheelAccumX = 0; wheelAccumY = 0; return; }
            if (Math.abs(wheelAccumX) > 8) e.preventDefault();
            const liveOffset = Math.max(-120, Math.min(120, -wheelAccumX));
            carousel.style.transition = 'none';
            carousel.style.transform  = `translateX(calc(-100% + ${liveOffset}px))`;
            clearTimeout(wheelTimer);
            wheelTimer = setTimeout(() => {
                if (Math.abs(wheelAccumX) >= WHEEL_THRESHOLD) commitMonthShift(wheelAccumX > 0 ? +1 : -1);
                else { carousel.style.transition = 'transform 0.25s cubic-bezier(0.4,0,0.2,1)'; carousel.style.transform = 'translateX(-100%)'; }
                wheelAccumX = 0; wheelAccumY = 0;
            }, 80);
        }, { passive: false });
    }

    // ── Cal Day Detail Panel ─────────────────────────────────────────────
    function openCalDayPanel(dateStr, events) {
        calDayPanelDateStr = dateStr;
        const panel      = document.getElementById('cal-day-panel');
        const dateLabel  = document.getElementById('cal-day-panel-date');
        const countLabel = document.getElementById('cal-day-panel-count');
        const eventsList = document.getElementById('cal-day-panel-events');

        const d             = new Date(dateStr + 'T00:00:00Z');
        const dayName       = d.toLocaleDateString('en-US', { weekday: 'long', timeZone: 'UTC' });

    function scrollToSlide(slideElement, smooth = true) {
        if (!slideElement) return;
        const container = document.getElementById('day-view-container');
        const targetLeft = slideElement.offsetLeft;
        if (!smooth) { container.scrollLeft = targetLeft; return; }
        // Manual RAF animation — iOS Safari < 15 ignores behavior:'smooth'
        const startLeft = container.scrollLeft;
        const delta     = targetLeft - startLeft;
        if (Math.abs(delta) < 2) return;
        const duration  = 320;
        const startTime = performance.now();
        (function step(now) {
            const elapsed  = now - startTime;
            const progress = Math.min(elapsed / duration, 1);
            const ease     = 1 - Math.pow(1 - progress, 3); // ease-out cubic
            container.scrollLeft = startLeft + delta * ease;
            if (progress < 1) requestAnimationFrame(step);
        })(startTime);
    }

    // Check if push notifications are supported in this context.
    // iOS Safari requires PWA mode (standalone) + iOS 16.4+.
    function isPushSupported() {
        if (!('Notification' in window)) return false;
        if (!('serviceWorker' in navigator)) return false;
        if (!('PushManager' in window)) return false;
        return true;
    }

    // Show custom in-app prompt. The onAllow callback is wired directly

    function showPushPermissionPrompt(onAllow, onDismiss) {
        if (document.getElementById('push-permission-prompt')) return;

        const isStandalone = window.navigator.standalone ||
                             window.matchMedia('(display-mode: standalone)').matches;
        const isDenied     = 'Notification' in window && Notification.permission === 'denied';

        const prompt = document.createElement('div');

        prompt.className = 'fixed bottom-20 left-1/2 z-[200] max-w-sm w-[92%] bg-slate-800 border border-blue-500/30 rounded-2xl shadow-2xl p-4';
        prompt.style.cssText = 'opacity:0; transform: translateX(-50%) translateY(16px); transition: all 0.3s cubic-bezier(0.4,0,0.2,1);';

        const settingsNote = isDenied
            ? `<p class="text-[10px] text-amber-400/80 mt-2 leading-snug">⚠️ Notifications are blocked. Tapping Enable will show you how to allow them in your browser settings.</p>`
            : '';

        const pwaNote = isStandalone && /iPad|iPhone|iPod/.test(navigator.userAgent)
            ? `<p class="text-[10px] text-slate-500 mt-2 leading-snug">Make sure notifications are enabled for this app in iOS Settings → Notifications.</p>`
            : '';

        prompt.innerHTML = `
            <div class="flex items-start gap-3 mb-4">
                <div class="w-10 h-10 bg-blue-600/20 rounded-xl flex items-center justify-center shrink-0 border border-blue-500/30">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-blue-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
                    </svg>
                </div>
                <div class="flex-1">
                    <p class="text-white font-black text-sm uppercase tracking-wide">Schedule Notifications</p>
                    <p class="text-slate-400 text-[11px] mt-0.5 leading-snug">Get notified when the weekly schedule is uploaded or a class venue changes.</p>
                    ${settingsNote}
                    ${pwaNote}
                </div>
            </div>
            <div class="flex gap-2">
                <button id="push-allow-btn"   class="flex-1 bg-blue-600 hover:bg-blue-500 text-white font-black text-xs uppercase tracking-widest py-2.5 rounded-xl active:scale-95 transition-all">Enable</button>
                <button id="push-dismiss-btn" class="flex-1 bg-slate-700 hover:bg-slate-600 text-slate-300 font-black text-xs uppercase tracking-widest py-2.5 rounded-xl active:scale-95 transition-all">Not Now</button>
            </div>`;

        document.body.appendChild(prompt);
        requestAnimationFrame(() => { prompt.style.opacity = '1'; prompt.style.transform = 'translateX(-50%) translateY(0)'; });

        const hidePrompt = () => {
            prompt.style.opacity = '0';
            prompt.style.transform = 'translateX(-50%) translateY(16px)';
            setTimeout(() => prompt.remove(), 300);
        };

        // CRITICAL: requestPermission() called directly inside onclick — preserves user gesture
        // on iOS PWA and strict browsers. Must NOT be inside an async callback chain.
        document.getElementById('push-allow-btn').onclick = () => {
            hidePrompt();
            onAllow(); // onAllow itself calls requestPermission synchronously
        };
        document.getElementById('push-dismiss-btn').onclick = () => {
            hidePrompt();
            onDismiss();
        };
    }

    async function setupPushSubscription() {
        try {
            if (!isPushSupported()) return;

            const permission = Notification.permission;

            if (permission === 'granted') {
                // Already allowed — try to subscribe if FCM is configured
                if (VAPID_KEY !== 'YOUR_VAPID_PUBLIC_KEY_HERE' && window._fcm) {
                    const reg = window._swReg || await navigator.serviceWorker.ready;
                    await doSubscribe(reg);
                }

            } else if (permission === 'default') {
                // Never asked — show custom prompt, then native dialog
                // Permission prompt works independently of FCM/VAPID config
                showPushPermissionPrompt(
                    () => {
                        // Fires synchronously inside onclick — user gesture preserved
                        Notification.requestPermission().then(async result => {
                            if (result === 'granted') {
                                // Only subscribe to FCM if keys are configured
                                if (VAPID_KEY !== 'YOUR_VAPID_PUBLIC_KEY_HERE') {
                                    // Wait for FCM to load if not yet ready
                                    if (!window._fcm) await new Promise(r => setTimeout(r, 3000));
                                    if (window._fcm) {
                                        const reg = window._swReg || await navigator.serviceWorker.ready;
                                        await doSubscribe(reg);
                                    }
                                }
                            } else {
                                localStorage.setItem('push_denied_at', Date.now().toString());
                            }
                        });
                    },
                    () => { /* Not Now — ask again next session */ }
                );

            } else if (permission === 'denied') {
                const deniedAt = parseInt(localStorage.getItem('push_denied_at') || '0');
                const TWO_DAYS = 2 * 24 * 60 * 60 * 1000;
                if (Date.now() - deniedAt < TWO_DAYS) return;

                showPushPermissionPrompt(
                    () => {
                        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
                        const msg   = isIOS
                            ? 'Go to iOS Settings → Notifications → AFMC Schedule → Allow Notifications'
                            : 'Tap the 🔒 / ⓘ icon in your browser address bar → Notifications → Allow';
                        showInAppToast('Enable in Settings', msg);
                        localStorage.setItem('push_denied_at', Date.now().toString());
                    },
                    () => { localStorage.setItem('push_denied_at', Date.now().toString()); }
                );
            }
        } catch (e) { console.warn('[Push] Setup failed:', e); }
    }

    async function doSubscribe(swReg) {
        try {
            const { getToken, onMessage, messaging } = window._fcm;
            // Wait for SW to be fully active — fixes "no active Service Worker" error
            const readyReg = await navigator.serviceWorker.ready;
            const token = await getToken(messaging, { vapidKey: VAPID_KEY, serviceWorkerRegistration: readyReg });
            if (!token) return;
            const r = parseInt(localStorage.getItem('afmc_roll_no') || '0');
            await setDoc(doc(db, `artifacts/schedule-debeb/public/data/push_tokens/${token}`), {
                token, roll: r || null, updatedAt: new Date().toISOString(), userAgent: navigator.userAgent.substring(0, 100)
            });
            onMessage(messaging, (payload) => {
                const { title, body } = payload.notification || {};
                showInAppToast(title || 'Schedule Update', body || '');
            });
            console.log('[Push] Subscribed successfully');
        } catch (e) { console.warn('[Push] doSubscribe failed:', e); }
    }

        toast.style.cssText = 'opacity:0; transform: translateX(-50%) translateY(-12px);';
        toast.innerHTML = `
            <div class="w-8 h-8 bg-blue-600 rounded-xl flex items-center justify-center shrink-0 mt-0.5">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
                </svg>
            </div>
            <div class="flex-1 min-w-0">
                <p class="text-white font-black text-xs uppercase tracking-wide">${title}</p>
                <p class="text-slate-400 text-[11px] mt-0.5 leading-snug">${body}</p>
            </div>
            <button onclick="this.parentElement.remove()" class="text-slate-500 hover:text-white shrink-0 p-1">✕</button>`;
        document.body.appendChild(toast);
        requestAnimationFrame(() => {
            toast.style.transition = 'all 0.3s cubic-bezier(0.4,0,0.2,1)';
            toast.style.opacity    = '1';
            toast.style.transform  = 'translateX(-50%) translateY(0)';
        });
        setTimeout(() => {
            if (!toast.parentElement) return;
            toast.style.opacity   = '0';
            toast.style.transform = 'translateX(-50%) translateY(-12px)';
            setTimeout(() => toast.remove(), 300);
        }, 6000);
    }

    function handleNotificationDeepLink({ notifType, eventDate, eventId }) {
        switchView('schedule');
        if (!eventDate) return;
        setTimeout(() => {
            const slide = document.querySelector(`.day-slide[data-date="${eventDate}"]`)
                       || Array.from(document.querySelectorAll('.day-slide')).find(s => s.dataset.date >= eventDate);
            if (!slide) return;
            scrollToSlide(slide, true);
            updateDatePickerLabel(eventDate);
            if ((notifType === 'venue_change' || notifType === 'faculty_change') && eventId) {
                setTimeout(() => {
                    const idx = personalizedSchedule.findIndex(e => e.id === eventId);
                    if (idx !== -1 && personalizedSchedule[idx].isDynamic) window.showDetails(eventDate, idx);
                }, 400);
            }
        }, 100);
    }

    function checkUrlDeepLink() {
        const params    = new URLSearchParams(window.location.search);
        const eventDate = params.get('date');
        const eventId   = params.get('eventId');
        if (eventDate) {
            handleNotificationDeepLink({ notifType: 'venue_change', eventDate, eventId });
            window.history.replaceState({}, '', window.location.pathname);
        }
    }

    // ═══════════════════════════════════════════════════════════════════════
    // BOOT
    // ═══════════════════════════════════════════════════════════════════════
// ... existing logic above ...

    // ═══════════════════════════════════════════════════════════════════════
    // BOOT
    // ═══════════════════════════════════════════════════════════════════════
    window.onload = initialize;

    // Store SW registration globally so push subscription can be set up
    // after the app initialises
    window._swReg = null;

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', async () => {
            try {
                // Register sw.js as the SINGLE consolidated controller
                const reg = await navigator.serviceWorker.register('./sw.js');
                console.log('✅ Consolidated SW Registered');
                window._swReg = reg;
            } catch (err) {
                console.error('❌ SW Registration Failed', err);
            }
        });

        navigator.serviceWorker.addEventListener('message', (event) => {
            if (!event.data) return;
            if (event.data.type === 'SW_UPDATED')         window.location.reload();
            if (event.data.type === 'NOTIFICATION_CLICK') handleNotificationDeepLink(event.data);
        });
    }
    </script>
</body>
</html>
